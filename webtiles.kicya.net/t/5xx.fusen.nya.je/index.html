<!DOCTYPE html>
<html lang="en">

<style>.tile-body {
  color: #fff;
  background: #000;
  padding: 0 10px;
  font-family: Times New Roman, Times, serif;
  font-size: 11px;
}

h1 {
  font-size: 15px;
  font-style: italic;
}

p {
  width: 230px;
}

img {
  image-rendering: pixelated;
  transition: all .5s;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(1);
}

.active img {
  top: 37px;
  left: -37px;
  transform: scale(.65);
}
</style>
<body>
<h1>Nekoweb is taking a nap</h1>
<p>Our server is currently asleep. This is a temporary error, and it will be fixed soon.</p>
<div>
<img src="nekonap250.jpg" alt="Eepy Cat">
</div>
</body>
</html>
