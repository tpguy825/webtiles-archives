<html lang="en">
<head>

}

a {

  text-decoration: none;
  display: block;
}

.w {
  color: #f0f;
  text-align: center;
  margin: 0;
  font-family: Tangerine, cursive;
  font-size: 200px;
  font-style: normal;
  font-weight: 400;
  text-decoration: none;
  transform: translate(-5px, -30px);
}

a:hover .w {
  animation: .5s infinite rainbow;
}

@keyframes rainbow {
  0% {
    color: red;
  }

  10% {
    color: #fa0;
  }

  20% {
    color: #ff0;
  }

  30% {
    color: #af0;
  }

  40% {
    color: #0f0;
  }

  50% {
    color: #0ff;
  }

  60% {
    color: #0af;
  }

  70% {
    color: #00f;
  }

  80% {
    color: #a0f;
  }

  90% {
    color: #f0f;
  }

  100% {
    color: #f0a;
  }
}
</style>
