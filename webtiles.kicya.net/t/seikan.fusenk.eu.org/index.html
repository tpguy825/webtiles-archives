<!DOCTYPE html>
<html lang="jp">
<head>
<style>.tile-body {
  color: #000;
  text-align: center;
  background: #f68a1e;
  border: 0;
  margin: 0;
  padding: 150px 10px;
  font-size: 13px;
}

header, footer {
  width: 230px;
}

header {
  position: absolute;
  top: 5px;
}

footer {
  position: absolute;
  top: 205px;
}

a {
  color: #000;
}

img {
  image-rendering: pixelated;
  transition: all .3s;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(1);
}

.active img {
  top: -10px;
  transform: scale(.7);
}
</style>
</head>
<body>
<header>

</header>
<footer>

</body>
</html>
