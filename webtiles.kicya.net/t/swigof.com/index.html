<html lang="en">
<head>
    <style>.tile-body {
  -webkit-text-size-adjust: none;
  -moz-text-size-adjust: none;
  -ms-text-size-adjust: none;
  text-size-adjust: none;
  user-select: none;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  display: inline !important;
}

.bg {
  display: block;
  position: absolute;
}

.marquee-container {
  position: relative;
  top: -30px;
}

.glass-div {
  backdrop-filter: blur(2px);
  background: #ffffff40;
  border: 1px solid #ffffff80;
  border-radius: 3px;
  outline: 1px solid #0006;
}

.main {
  width: 150px;
  height: 156px;
  position: relative;
  top: 30px;
  box-shadow: 0 0 20px #000;
}

.frame {
  border: none;
  width: 142px;
  height: 156px;
  margin-top: 3px;
  margin-left: 4px;
}

.window-title {
  text-shadow: 0 0 5px #fff;
  cursor: default;
  user-select: none;
  height: 17px;
  font-size: 12px;
}

.window-content {
  background: #fff;
  border: 1px solid #000000bf;
  outline: 1px solid #ffffff80;
  height: 124px;
  margin: 5px 1px 1px;
}

.content {
  border: 1px solid #b9d0df;
  height: 122px;
}

.content > img {
  position: absolute;
}

.content > canvas {
  image-rendering: pixelated;
}

@keyframes bounceX {
  0% {
    left: 50px;
  }

  25% {
    left: 100px;
  }

  75% {
    left: 0;
  }

  100% {
    left: 50px;
  }
}

@keyframes bounceY {
  0% {
    top: 0;
  }

  100% {
    top: 94px;
  }
}
</style>
</head>
<body>
    <img hidden id="sheet" src="flappy-bird-set.png" alt="spritesheet">
    
    <img class="bg" src="dress2.png">
    <div class="marquee-container">
        <marquee direction="up" behavior="alternate" height="312" width="250">
            <marquee behavior="alternate" height="220">
                <div class="glass-div main" id="main">
                    <div class="frame">
                        <div id="window-title" class="window-title">🐦 Floppy Bord</div>
                        <div class="window-content">
                            <div class="content">
                                <img id="thumb" src="thumb.png" alt="thumbnail">
                                <canvas id="canvas" width="136" height="122"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </marquee>
        </marquee>
    </div>
    <script type="text/tilescript">/**

/**
Performance is good on chrome
Performance is good on firefox when locally hosted
Performance is abysmal on firefox in webtiles
JS-Interpreter >:(
**/

// change sprites / game

var canvas = document.getElementById('canvas');
var thumb = document.getElementById('thumb');
var img = document.getElementById('sheet');
var title = document.getElementById('window-title');
var ctx = canvas.getContext('2d', { alpha: false });
var dataImageBG = document.createElement('img');
var dataImagePipe = document.createElement('img');
var dataImageBird = document.createElement('img');

var gamePlaying = false;
var gravity = .2;
var speed = 2;
var halfSpeed = speed/2;
var size = [17, 12];
var spriteCenter = [~~((canvas.width / 2) - size[0] / 2), ~~((canvas.height / 2) - (size[1] / 2))]
var jump = -4;
var cTenth = 14;
var pipeWidth = 26;
var pipeGap = 80;
var pipeSpacing = pipeWidth + pipeGap;

var index = 0,
    bestScore = 0,
    flight,
    flyHeight,
    currentScore,
	idealFrameStart,
    frameDelay,
    doubleCanvasWidth;

function load() {
    ctx.imageSmoothingEnabled = false;
    canvas.offscreenCanvas = document.createElement('canvas');

    thumb.style.display = 'none';
    
    doubleCanvasWidth = canvas.width * 2;

    var offscreenCanvas = canvas.offscreenCanvas;
    var offscreenCanvasCtx = offscreenCanvas.getContext('2d');

    // Prep background
    offscreenCanvas.width = canvas.width * 2;
    offscreenCanvas.height = canvas.height;
    offscreenCanvasCtx.drawImage(img, 0, 100, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
    offscreenCanvasCtx.drawImage(img, 0, 100, canvas.width, canvas.height, canvas.width, 0, canvas.width, canvas.height);
    dataImageBG.src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);

    // Prep pipes
    offscreenCanvas.width = "26";
    offscreenCanvas.height = "410";
    offscreenCanvasCtx.drawImage(img, 144, 36, pipeWidth, 160, 0, 0, pipeWidth, 160);
    offscreenCanvasCtx.drawImage(img, 170, 36, pipeWidth, 160, 0, 160 + pipeGap, pipeWidth, 160);
    dataImagePipe.src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    
    // Prep bird
    offscreenCanvas.width = size[0];
    offscreenCanvas.height = size[1] * 3;
    offscreenCanvasCtx.drawImage(img, 144, 0 * size[1], size[0], size[1], 0, 0 * size[1], size[0], size[1]);
    offscreenCanvasCtx.drawImage(img, 144, 1 * size[1], size[0], size[1], 0, 1 * size[1], size[0], size[1]);
    offscreenCanvasCtx.drawImage(img, 144, 2 * size[1], size[0], size[1], 0, 2 * size[1], size[0], size[1]);
    dataImageBird.src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    
    setup();

    idealFrameStart = Date.now();

    update();
}

function pipeLoc() {
    return ~~((Math.random() * (canvas.height - pipeGap - 20)) + 10);
}

function start() {
    gamePlaying = true;
    canvas.onclick = doJump;
    title.innerText = '🐦 Now: ' + currentScore + ' -- Best: ' + bestScore;
}

function doJump() {
    flight = jump;
}

function setup() {
    currentScore = 0;
    flight = jump;

    // set initial flyHeight (middle of screen - size of the bird)
    flyHeight = spriteCenter[1];

    // setup pipes
    pipes = [
        [canvas.width, pipeLoc()],
        [canvas.width + pipeSpacing, pipeLoc()]
    ]
    
    title.innerText = '🐦 Floppy Bord';
    
    canvas.onclick = start;
}

function update() {
    // make the pipe and bird moving
    index++;

    ctx.drawImage(dataImageBG, 0, 0, doubleCanvasWidth, canvas.height, -(index * halfSpeed) % canvas.width, 0, doubleCanvasWidth, canvas.height);

    // pipe display
    if (gamePlaying) {
        for (var i = 0; i < pipes.length; i++) {
            // pipe moving
            pipes[i][0] -= speed;

            ctx.drawImage(dataImagePipe, pipes[i][0], pipes[i][1] - 160);
        }

        // give 1 point & create new pipe
        if(pipes[0][0] <= -pipeWidth){
            currentScore++;
            // check if it's the best score
            bestScore = Math.max(bestScore, currentScore);

            // remove & create new pipe
            pipes[0] = pipes[1];
            pipes[1] = [pipes[0][0] + pipeSpacing, pipeLoc()];
            
    		title.innerText = '🐦 Now: ' + currentScore + ' -- Best: ' + bestScore;
        }

        // if hit the pipe, end
        if ((pipes[0][0] <= cTenth + size[0]) &&
            (pipes[0][0] + pipeWidth >= cTenth) &&
            (pipes[0][1] > flyHeight || pipes[0][1] + pipeGap < flyHeight + size[1])) {
            gamePlaying = false;
            setup();
        }
    }
    
    if (gamePlaying) {
        ctx.drawImage(dataImageBird, 0, ~~((index % 9) / 3) * size[1], size[0], size[1], cTenth, ~~flyHeight, size[0], size[1]);
        flight += gravity;
        flyHeight = Math.min(flyHeight + flight, canvas.height - size[1]);
    }
    else {
        ctx.drawImage(dataImageBird, 0, ~~((index % 9) / 3) * size[1], size[0], size[1], spriteCenter[0], ~~flyHeight, size[0], size[1]);
        // text accueil
        ctx.fillText('Best score : ' + bestScore, 28, 81);
        ctx.fillText('Click to play', 30, 45);
        ctx.font = "bold 10px monospace";
    }

    idealFrameStart += 16;
    frameDelay = idealFrameStart - Date.now();
    if (frameDelay < -100) {
        // fallen very far behind, likely caused by engine pause
        frameDelay = 0;
        idealFrameStart = Date.now();
    }
    setTimeout(update, frameDelay);
}

load();
</script>
</body>
</html>
