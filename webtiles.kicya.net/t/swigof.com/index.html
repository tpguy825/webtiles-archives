<!DOCTYPE html>
<html lang="en">
<head>
    <style>.tile-body {
  -webkit-text-size-adjust: none;
  -moz-text-size-adjust: none;
  -ms-text-size-adjust: none;
  text-size-adjust: none;
  user-select: none;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  display: inline !important;
}

.bg {
  display: block;
}

.glass-div {
  backdrop-filter: blur(2px);
  background: #ffffff40;
  border: 1px solid #ffffff80;
  border-radius: 3px;
  outline: 1px solid #0006;
}

.main {
  width: 150px;
  height: 156px;
  animation: 3s linear infinite bounceX, 3s linear infinite alternate bounceY;
  position: absolute;
  top: 0;
  left: 50px;
  box-shadow: 0 0 20px #000;
}

.frame {
  border: none;
  width: 142px;
  height: 156px;
  margin-top: 3px;
  margin-left: 4px;
}

.window-title {
  text-shadow: 0 0 5px #fff;
  cursor: default;
  user-select: none;
  height: 17px;
  font-size: 12px;
}

.window-content {
  background: #fff;
  border: 1px solid #000000bf;
  outline: 1px solid #ffffff80;
  height: 124px;
  margin: 5px 1px 1px;
}

.content {
  border: 1px solid #b9d0df;
  height: 122px;
}

.content > img {
  width: 100%;
}

@keyframes bounceX {
  0% {
    left: 50px;
  }

  25% {
    left: 100px;
  }

  75% {
    left: 0;
  }

  100% {
    left: 50px;
  }
}

@keyframes bounceY {
  0% {
    top: 0;
  }

  100% {
    top: 94px;
  }
}
</style>
</head>
<body>
    
    <img class="bg" src="dress2.png">

    <div class="glass-div main" id="main">
        <div class="frame">
            <div class="window-title">🐇 Bnuuy</div>
            <div class="window-content">
                <div class="content">
					<img src="bnuuy.gif" alt="bnuuy">
                </div>
            </div>
        </div>
    </div>
    <script type="text/tilescript">/**

"use strict";

var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var img = document.createElement('img');
img.src = "https://i.ibb.co/0RxNhhCV/flappy-bird-set.png";

// general settings
var gamePlaying = true;
var gravity = .16;
var speed = 2;
var size = [17, 12];
var jump = -3.8;
var cTenth = canvas.width / 10;
var index = 0,
  bestScore = 0,
  flight,
  flyHeight,
  currentScore,
  pipes;

// pipe settings
var pipeWidth = 26;
var pipeGap = 90;
function pipeLoc() {
  return Math.random() * (canvas.height - (pipeGap + pipeWidth) - pipeWidth) + pipeWidth;
};
function setup() {
  currentScore = 0;
  flight = jump;

  // set initial flyHeight (middle of screen - size of the bird)
  flyHeight = canvas.height / 2 - size[1] / 2;

  // setup first 3 pipes
  pipes = [
      [canvas.width + 0 * (pipeGap + pipeWidth), pipeLoc()],
      [canvas.width + 1 * (pipeGap + pipeWidth), pipeLoc()],
      [canvas.width + 2 * (pipeGap + pipeWidth), pipeLoc()]
  ];
};
function render() {
  // make the pipe and bird moving 
  index++;

  // ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background first part 
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height, -(index * (speed / 2) % canvas.width) + canvas.width, 0, canvas.width, canvas.height);
  // background second part
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height, -(index * (speed / 2)) % canvas.width, 0, canvas.width, canvas.height);

  // pipe display
  if (gamePlaying) {
    pipes.map(function (pipe) {
      // pipe moving
      pipe[0] -= speed;

      // top pipe
      ctx.drawImage(img, 72, 65 - pipe[1], pipeWidth, pipe[1], pipe[0], 0, pipeWidth, pipe[1]);
      // bottom pipe
      ctx.drawImage(img, 144 + pipeWidth, 36, pipeWidth, canvas.height - pipe[1] + pipeGap, pipe[0], pipe[1] + pipeGap, pipeWidth, canvas.height - pipe[1] + pipeGap);

      // give 1 point & create new pipe
      if (pipe[0] <= -pipeWidth) {
        currentScore++;
        // check if it's the best score
        bestScore = Math.max(bestScore, currentScore);

        // remove & create new pipe
        pipes = [].concat(_toConsumableArray(pipes.slice(1)), [[pipes[pipes.length - 1][0] + pipeGap + pipeWidth, pipeLoc()]]);
      }

      // if hit the pipe, end
      if ([pipe[0] <= cTenth + size[0], pipe[0] + pipeWidth >= cTenth, pipe[1] > flyHeight || pipe[1] + pipeGap < flyHeight + size[1]].every(function (elem) {
        return elem;
      })) {
        gamePlaying = false;
        setup();
      }
    });
  }
  // draw bird
  if (gamePlaying) {
    ctx.drawImage.apply(ctx, [img, 144, Math.floor(index % 9 / 3) * size[1]].concat(size, [cTenth, flyHeight], size));
    flight += gravity;
    flyHeight = Math.min(flyHeight + flight, canvas.height - size[1]);
  } else {
    ctx.drawImage.apply(ctx, [img, 144, Math.floor(index % 9 / 3) * size[1]].concat(size, [canvas.width / 2 - size[0] / 2, flyHeight], size));
    flyHeight = canvas.height / 2 - size[1] / 2;
  }
};

// launch setup
setup();

setInterval(render, 33);

window.onclick = function () {
  return flight = jump;
};

</script>
</body>
</html>
