<html lang="en">
<head>
    <style>.tile-body {
  -webkit-text-size-adjust: none;
  -moz-text-size-adjust: none;
  -ms-text-size-adjust: none;
  text-size-adjust: none;
  user-select: none;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  display: inline !important;
}

.bg {
  display: block;
}

.glass-div {
  backdrop-filter: blur(2px);
  background: #ffffff40;
  border: 1px solid #ffffff80;
  border-radius: 3px;
  outline: 1px solid #0006;
}

.main {
  width: 150px;
  height: 156px;
  animation: 3s linear infinite bounceX, 3s linear infinite alternate bounceY;
  position: absolute;
  top: 0;
  left: 50px;
  box-shadow: 0 0 20px #000;
}

.frame {
  border: none;
  width: 142px;
  height: 156px;
  margin-top: 3px;
  margin-left: 4px;
}

.window-title {
  text-shadow: 0 0 5px #fff;
  cursor: default;
  user-select: none;
  height: 17px;
  font-size: 12px;
}

.window-content {
  background: #fff;
  border: 1px solid #000000bf;
  outline: 1px solid #ffffff80;
  height: 124px;
  margin: 5px 1px 1px;
}

.content {
  border: 1px solid #b9d0df;
  height: 122px;
}

.content > img {
  position: absolute;
}

.content > canvas {
  image-rendering: pixelated;
}

@keyframes bounceX {
  0% {
    left: 50px;
  }

  25% {
    left: 100px;
  }

  75% {
    left: 0;
  }

  100% {
    left: 50px;
  }
}

@keyframes bounceY {
  0% {
    top: 0;
  }

  100% {
    top: 94px;
  }
}
</style>
</head>
<body>
    
    <img class="bg" src="dress2.png">
    <div class="glass-div main" id="main">
        <div class="frame">
            <div class="window-title">🐦 Bord (wip)</div>
            <div class="window-content">
                <div class="content">
					<img id="thumb" src="thumb.png" alt="bord">
                    <canvas id="canvas" width="136" height="122"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script type="text/tilescript">/**

// fix pipes not appearing at first
// fix loop breaking after a pause
// change sprites / game
// move down initial window position
// text as elements, draw scores during gameplay
// fix inner window border choppiness from css anim?
// fix flashing bird (reduce draw calls / generally optimize)
//  single backgroud draw call / draw background as normal css scrolling bg image
//  predraw background and bird frames to offscreen canvas then draw the canvas to frame
//  draw integer coordinates only
//  shrink pipes height

var canvas = document.getElementById('canvas');
var thumb = document.getElementById('thumb');
var ctx = canvas.getContext('2d', { alpha: false });
var img = document.createElement('img');
img.src = "flappy-bird-set.png";

// general settings
var gamePlaying = false;
var gravity = .2;
var speed = 2;
var size = [17, 12];
var jump = -4;
var cTenth = 14;

var index = 0,
    bestScore = 0,
    flight,
    flyHeight,
    currentScore,
	idealFrameStart,
    pipeCanvas,
    pipeContext;

// pipe settings
var pipeWidth = 26;
var pipeGap = 90;
function pipeLoc() {
    return (Math.random() * ((canvas.height - (pipeGap + pipeWidth)) - pipeWidth)) + pipeWidth;
}

function start() {
    gamePlaying = true;
}

function doJump() {
    flight = jump;
}

function setup() {
    currentScore = 0;
    flight = jump;

    // set initial flyHeight (middle of screen - size of the bird)
    flyHeight = (canvas.height / 2) - (size[1] / 2);

    // setup first 3 pipes
    pipes = [
        [canvas.width + (0 * (pipeGap + pipeWidth)), pipeLoc()],
        [canvas.width + (1 * (pipeGap + pipeWidth)), pipeLoc()]
    ]
}

function update() {
    // make the pipe and bird moving
    index++;

//     ctx.clearRect(0, 0, canvas.width, canvas.height);
    // background first part
    ctx.drawImage(img, 0, 100, canvas.width, canvas.height, -((index * (speed / 2)) % canvas.width) + canvas.width, 0, canvas.width, canvas.height);
    // background second part
    ctx.drawImage(img, 0, 100, canvas.width, canvas.height, -(index * (speed / 2)) % canvas.width, 0, canvas.width, canvas.height);

    // pipe display
    if (gamePlaying){
        for (var i = 0; i < pipes.length; i++) {
            // pipe moving
            pipes[i][0] -= speed;

            ctx.drawImage(pipeCanvas, pipes[i][0], pipes[i][1] - 160);
        }

        // give 1 point & create new pipe
        if(pipes[0][0] <= -pipeWidth){
            currentScore++;
            // check if it's the best score
            bestScore = Math.max(bestScore, currentScore);

            // remove & create new pipe
            pipes[0] = pipes[1];
            pipes[1] = [pipes[0][0] + pipeGap + pipeWidth, pipeLoc()];
        }

        // if hit the pipe, end
        if ((pipes[0][0] <= cTenth + size[0]) &&
            (pipes[0][0] + pipeWidth >= cTenth) &&
            (pipes[0][1] > flyHeight || pipes[0][1] + pipeGap < flyHeight + size[1])) {
            gamePlaying = false;
            setup();
        }
    }
    
    if (gamePlaying) {
        ctx.drawImage(img, 144, Math.floor((index % 9) / 3) * size[1], size[0], size[1], cTenth, flyHeight, size[0], size[1]);
        flight += gravity;
        flyHeight = Math.min(flyHeight + flight, canvas.height - size[1]);
    }
    else {
        ctx.drawImage(img, 144, Math.floor((index % 9) / 3) * size[1], size[0], size[1], ((canvas.width / 2) - size[0] / 2), flyHeight, size[0], size[1]);
        flyHeight = (canvas.height / 2) - (size[1] / 2);
        // text accueil
        ctx.fillText('Best score : ' + bestScore, 28, 81);
        ctx.fillText('Click to play', 30, 45);
        ctx.font = "bold 10px courier";
    }

    //  document.getElementById('bestScore').innerHTML = `Best : ${bestScore}`;
    //  document.getElementById('currentScore').innerHTML = `Current : ${currentScore}`;

    idealFrameStart += 16;
    setTimeout(update, idealFrameStart - Date.now());
}

thumb.style.display = 'none';

canvas.addEventListener('click', start);
canvas.onclick = doJump;

ctx.imageSmoothingEnabled = false;

pipeCanvas = document.createElement("canvas");
pipeCanvas.width = "26";
pipeCanvas.height = "410";
pipeContext = pipeCanvas.getContext("2d");
pipeContext.drawImage(img, 144, 36, pipeWidth, 160, 0, 0, pipeWidth, 160);
pipeContext.drawImage(img, 170, 36, pipeWidth, 160, 0, 160 + pipeGap, pipeWidth, 160);

setup();

idealFrameStart = Date.now();

update();
</script>
</body>
</html>
