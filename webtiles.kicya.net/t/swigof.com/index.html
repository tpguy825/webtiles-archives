<html lang="en">
<head>
    <style>.tile-body {
  -webkit-text-size-adjust: none;
  -moz-text-size-adjust: none;
  -ms-text-size-adjust: none;
  text-size-adjust: none;
  user-select: none;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  display: inline !important;
}

.bg {
  display: block;
  position: absolute;
  top: -35px;
  left: -85px;
}

.marquee-container {
  position: relative;
  top: -30px;
}

.glass-div {
  backdrop-filter: blur(2px);
  background: #ffffff40;
  border: 1px solid #ffffff80;
  border-radius: 3px;
  outline: 1px solid #0006;
}

.main {
  width: 150px;
  height: 156px;
  position: relative;
  top: 30px;
  box-shadow: 0 0 20px #000;
}

.frame {
  border: none;
  width: 142px;
  height: 156px;
  margin-top: 3px;
  margin-left: 4px;
}

.window-title {
  text-shadow: 0 0 5px #fff;
  cursor: default;
  user-select: none;
  height: 17px;
  font-size: 12px;
}

.window-content {
  background: #fff;
  border: 1px solid #000000bf;
  outline: 1px solid #ffffff80;
  height: 124px;
  margin: 5px 1px 1px;
}

.content {
  border: 1px solid #b9d0df;
  height: 122px;
}

.content > img {
  position: absolute;
}

.content > canvas {
  image-rendering: pixelated;
}

.taskbar {
  background: linear-gradient(#c8c8c8b3, #969696b3 50%, #7d7d7db3 50%);
  border-top: 1px solid #ffffff80;
  border-bottom: 1px solid #000;
  outline: 1px solid #464646b3;
  width: 250px;
  height: 27px;
  display: inline-flex;
  position: absolute;
  top: 221px;
}

.task {
  border: 1px solid #46464633;
  border-radius: 3px;
  width: 123px;
  height: 26px;
  margin: -1px 0 0;
  padding: 0;
}

.task > div {
  border: 1px solid #464646b3;
  border-radius: 3px;
  height: 24px;
}

.task > div > div {
  border: 1px solid #fff3;
  border-radius: 3px;
  height: 22px;
}

.task > div > div > div {
  color: #fff;
  height: 20px;
  padding-top: 3px;
  padding-left: 3px;
  font-size: 12px;
}

.task-selected > div, .task:hover:active > div {
  border: 1px solid #000;
}

.task-selected > div > div, .task:hover:active > div > div {
  background: #000000b3;
  border: 1px solid #fff0;
  border-top-color: #323232;
}

.task:hover > div > div > div {
  background: radial-gradient(70% 80% at bottom, #4ed9e2, #4ed9e200);
}

.task:hover:active > div > div > div {
  background: none;
}

.site-link > div > div > div > a {
  color: #fff;
  cursor: default;
  width: 100%;
  height: 100%;
  margin: -3px;
  padding: 3px;
  font-size: 12px;
  text-decoration: none;
  display: inline-flex;
}

.site-link > div > div > div > a > img {
  width: 15px;
  height: 15px;
  padding-top: 1px;
  padding-right: 5px;
}

@keyframes bounceX {
  0% {
    left: 50px;
  }

  25% {
    left: 100px;
  }

  75% {
    left: 0;
  }

  100% {
    left: 50px;
  }
}

@keyframes bounceY {
  0% {
    top: 0;
  }

  100% {
    top: 94px;
  }
}
</style>
</head>
<body>
    <img hidden id="sheet" src="sheet.png" alt="sheet">
    <img class="bg" src="bg.webp">
    <div class="marquee-container">
        <marquee direction="up" behavior="alternate" height="282" width="250">
            <marquee behavior="alternate" height="220">
                <div class="glass-div main" id="main">
                    <div class="frame">
                        <div id="window-title" class="window-title">🐇 Bnuuy Run</div>
                        <div class="window-content">
                            <div class="content">
                                <img id="thumb" src="thumb.png" alt="thumbnail">
                                <canvas id="canvas" width="136" height="122"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </marquee>
        </marquee>
    </div>
    <div class="taskbar">
        <div class="task task-selected"><div><div><div>🐇 Bnuuy Run</div></div></div></div>
        <div class="task site-link"><div><div><div>
            <a href="https://swigof.com/" target="_blank"><img src="icon.webp" alt="swigof"> swigof</a>
        </div></div></div></div>
    </div>
    <script type="text/tilescript">/**

/**
Performance is good on chrome
Performance is good on firefox when locally hosted
Performance is abysmal on firefox in webtiles
JS-Interpreter >:(
**/

var canvas = document.getElementById('canvas');
var thumb = document.getElementById('thumb');
var img = document.getElementById('sheet');
var title = document.getElementById('window-title');
var ctx = canvas.getContext('2d', { alpha: false });
var dataImageBG = document.createElement('img');
var dataImageBarrels = [document.createElement('img'),
                        document.createElement('img'),
                        document.createElement('img'),
                        document.createElement('img')];
var dataImageBunny = document.createElement('img');

var gamePlaying = false;
var jumping = false;
var gravity = .2;
var speed = 2;
var flyingBarrelSpeed = speed * 1.2;
var halfSpeed = speed/2;
var size = [14, 18];
var spriteCenter = [~~((canvas.width / 2) - size[0] / 2), ~~((canvas.height / 2) - (size[1] / 2))];
var jump = -4.2;
var cTenth = 14;
var barrelSizes = [[14, 15], [14, 30], [28, 15], [15, 15]];
var barrelHeightOffsets = [0, 0, 0, 30];
var ground = 106;

var index = 0,
    bestScore = 0,
    flight,
    flyHeight,
    currentScore,
	idealFrameStart,
    frameDelay,
    doubleCanvasWidth,
    barrels;

function load() {
    ctx.imageSmoothingEnabled = false;
    canvas.offscreenCanvas = document.createElement('canvas');

    thumb.style.display = 'none';
    
    doubleCanvasWidth = canvas.width * 2;

    var offscreenCanvas = canvas.offscreenCanvas;
    var offscreenCanvasCtx = offscreenCanvas.getContext('2d');

    // Prep background
    offscreenCanvas.width = canvas.width * 2;
    offscreenCanvas.height = canvas.height;
    offscreenCanvasCtx.drawImage(img, 0, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
    offscreenCanvasCtx.drawImage(img, 0, 0, canvas.width, canvas.height, canvas.width, 0, canvas.width, canvas.height);
    dataImageBG.src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);

    // Prep barrels
    // single
    offscreenCanvas.width = barrelSizes[0][0];
    offscreenCanvas.height = barrelSizes[0][1];
    offscreenCanvasCtx.drawImage(img, 150, 0, barrelSizes[0][0], barrelSizes[0][1], 0, 0, barrelSizes[0][0], barrelSizes[0][1]);
    dataImageBarrels[0].src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    // vertical double
    offscreenCanvas.width = barrelSizes[1][0];
    offscreenCanvas.height = barrelSizes[1][1];
    offscreenCanvasCtx.drawImage(img, 150, 0, barrelSizes[0][0], barrelSizes[0][1], 0, 0, barrelSizes[0][0], barrelSizes[0][1]);
    offscreenCanvasCtx.drawImage(img, 150, 0, barrelSizes[0][0], barrelSizes[0][1], 0, barrelSizes[0][1], barrelSizes[0][0], barrelSizes[0][1]);
    dataImageBarrels[1].src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    // horizontal double
    offscreenCanvas.width = barrelSizes[2][0];
    offscreenCanvas.height = barrelSizes[2][1];
    offscreenCanvasCtx.drawImage(img, 150, 0, barrelSizes[0][0], barrelSizes[0][1], 0, 0, barrelSizes[0][0], barrelSizes[0][1]);
    offscreenCanvasCtx.drawImage(img, 150, 0, barrelSizes[0][0], barrelSizes[0][1], barrelSizes[0][0], 0, barrelSizes[0][0], barrelSizes[0][1]);
    dataImageBarrels[2].src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    // flying
    offscreenCanvas.width = barrelSizes[3][0];
    offscreenCanvas.height = barrelSizes[3][1];
    offscreenCanvasCtx.drawImage(img, 150, 15, barrelSizes[3][0], barrelSizes[3][1], 0, 0, barrelSizes[3][0], barrelSizes[3][1]);
    dataImageBarrels[3].src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    
    // Prep bunny
    offscreenCanvas.width = size[0];
    offscreenCanvas.height = size[1] * 3;
    offscreenCanvasCtx.drawImage(img, 136, 0 * size[1], size[0], size[1], 0, 0 * size[1], size[0], size[1]);
    offscreenCanvasCtx.drawImage(img, 136, 1 * size[1], size[0], size[1], 0, 1 * size[1], size[0], size[1]);
    dataImageBunny.src = offscreenCanvas.toDataURL();
    offscreenCanvasCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    
    setup();

    idealFrameStart = Date.now();

    update();
}

function generateNextBarrel() {
    var spacing = ~~((Math.random() * 50) + 100);
    var type = ~~(Math.random() * 4);
    barrels[1] = [barrels[0][0] + spacing, ground - barrelSizes[type][1] - barrelHeightOffsets[type], type];
}

function start() {
    gamePlaying = true;
    canvas.onclick = doJump;
    title.innerText = '🐇 Now: ' + currentScore + ' -- Best: ' + bestScore;
}

function doJump() {
    if (!jumping) {
        flight = jump;
        jumping = true;
    }
}

function setup() {
    currentScore = 0;
    flight = 0;

    flyHeight = ground - size[1];

    barrels = [
        [canvas.width, ground - barrelSizes[0][1], 0],
        [canvas.width + 100, ground - barrelSizes[0][1], 0]
    ];
    
    title.innerText = '🐇 Bnuuy Run';
    
    canvas.onclick = start;
}

function update() {
    index++;

    ctx.drawImage(dataImageBG, 0, 0, doubleCanvasWidth, canvas.height, -(index * halfSpeed) % canvas.width, 0, doubleCanvasWidth, canvas.height);

    // obstacle display
    if (gamePlaying) {
        for (var i = 0; i < barrels.length; i++) {
            if (barrels[i][2] != 3) {
                barrels[i][0] -= speed;
                ctx.drawImage(dataImageBarrels[barrels[i][2]], barrels[i][0], barrels[i][1]);
            } else {
                barrels[i][0] -= flyingBarrelSpeed;
                if ((~~(index % 20 / 10)) == 0) {
                    ctx.drawImage(dataImageBarrels[3], ~~(barrels[i][0]), barrels[i][1]);
                } else {
                    ctx.drawImage(dataImageBarrels[0], ~~(barrels[i][0]), barrels[i][1]);
                }
            }
        }

        if (barrels[0][0] <= cTenth + size[0]) {
            // give 1 point & create new obstacle
            if(barrels[0][0] <= -barrelSizes[barrels[0][2]][0]) {
                currentScore++;
                // check if it's the best score
                bestScore = Math.max(bestScore, currentScore);

                // remove & create new obstacle
                barrels[0] = barrels[1];
                generateNextBarrel();

                title.innerText = '🐇 Now: ' + currentScore + ' -- Best: ' + bestScore;
            }
            // if hit the obstacle, end
            else if ((barrels[0][1] < flyHeight + size[1]) && // obstacle top edge v player bottom edge
                (barrels[0][0] + barrelSizes[barrels[0][2]][0] >= cTenth) && // obstacle right edge v player left edge
                (barrels[0][1] + barrelSizes[barrels[0][2]][1] >= flyHeight)) { // obstacle bottom edge v player top edge
                    gamePlaying = false;
                    setup();
            }
        }
    }
    
    if (gamePlaying) {
        ctx.drawImage(dataImageBunny, 0, ~~((index % 10) / 5) * size[1], size[0], size[1], cTenth, ~~flyHeight, size[0], size[1]);
        if (jumping) {
            flight += gravity;
            flyHeight += flight;
            if (flyHeight > ground - size[1]) {
            	flyHeight = ground - size[1];
            	jumping = false;
        	}
        }
    }
    else {
        ctx.drawImage(dataImageBunny, 0, ~~((index % 10) / 5) * size[1], size[0], size[1], spriteCenter[0], ~~flyHeight, size[0], size[1]);
        // text accueil
        ctx.fillText('Best score : ' + bestScore, 28, 60);
        ctx.fillText('Click to play', 30, 45);
        ctx.font = "bold 10px monospace";
    }

    idealFrameStart += 16;
    frameDelay = idealFrameStart - Date.now();
    if (frameDelay < -100) {
        // fallen very far behind, likely caused by engine pause
        frameDelay = 0;
        idealFrameStart = Date.now();
    }
    setTimeout(update, frameDelay);
}

load();
</script>
</body>
</html>
