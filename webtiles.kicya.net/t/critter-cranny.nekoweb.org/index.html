<!DOCTYPE html>
<html>
  
<head>



<style>h1, h2, h3, h4 {
  letter-spacing: 6px;
  color: #3f2e1c;
  margin: 6px 0 10px;
  font-family: SVThin;
}

h2 {
  font-family: SVThin;
  font-size: 20px;
}

h4 {
  font-family: SVThin;
  font-size: 12px;
}

@font-face {
  font-family: SVBold;
  src: url("https://webtiles.kicya.net/t/critter-cranny.nekoweb.org/[Assets]/Fonts/SVBold.ttf");
}

@font-face {
  font-family: SVThin;
  src: url("https://webtiles.kicya.net/t/critter-cranny.nekoweb.org/[Assets]/Fonts/SVThin.ttf");
}

.tile-body {
  font-family: SVThin;
}

* {
  box-sizing: border-box;
}

html, .tile-body {
  width: 100%;
  height: 100%;
  margin: 0;
}

@keyframes float {
  0% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(10px);
  }

  100% {
    transform: translateY(0);
  }
}

.float-box {
  cursor: grab;
  background: #ffffffb3;
  border: 6px ridge #8a6c56;
  border-radius: 14px;
  width: 280px;
  height: 180px;
  padding: 14px;
  animation-name: float;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
  position: absolute;
  overflow: auto;
}

.float-box:active {
  cursor: grabbing;
}

.depth-near {
  z-index: 30;
  animation-duration: 4s;
}

.depth-mid {
  z-index: 20;
  animation-duration: 4s;
}

.depth-far {
  z-index: 10;
  opacity: .9;
  animation-duration: 4s;
}

.float-box h2, .float-box h4 {
  background: #cbb28a99;
  border: 2px ridge #8a6c56;
  border-radius: 6px;
  padding: 4px 8px;
  display: inline-block;
}

.button-link {
  color: #cbb28a99 text-decoration: none;
  cursor: pointer;
  text-align: center;
  background-color: #3f2e1c;
  border: none;
  border-radius: 5px;
  padding: 10px 20px;
  display: inline-block;
}

.button-link:hover {
  background-color: #3f2e1c;
}

.profile-link {
  color: #000;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  display: inline-flex;
}

.profile-link:hover {
  text-decoration: underline;
}

.online {
  font-weight: bold;
}

.tile-body {
  background-image: url("https://webtiles.kicya.net/t/critter-cranny.nekoweb.org/Critter-s-Cranny-BG-DBrown-Quilt.jpg");
}

footer {
  text-align: center;
  padding: 10px;
  font-family: SVBold;
  display: none;
}

html, .tile-body {
  width: 100%;
  height: 100%;
  cursor: url("https://webtiles.kicya.net/t/critter-cranny.nekoweb.org/crusor.png") 16 16, auto !important;
}

html *, .tile-body * {
  cursor: url("https://webtiles.kicya.net/t/critter-cranny.nekoweb.org/crusor.png") 16 16, auto !important;
}

html.cursor-clicked, html.cursor-clicked * {
  cursor: url("https://webtiles.kicya.net/t/critter-cranny.nekoweb.org/cursor2.png") 16 16, auto !important;
}

html {
  cursor: none;
}

.box-1 {
  width: 1000px;
  height: 830px;
  top: 17px;
  left: 500px;
}

.box-2 {
  width: 350px;
  height: 170px;
  top: 17px;
  left: 1398px;
}

.box-3 {
  width: 270px;
  top: 206px;
  left: 15px;
  transform: translateX(-50%);
}
</style>
