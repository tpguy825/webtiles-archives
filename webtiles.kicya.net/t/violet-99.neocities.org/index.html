<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>.overlay {
  pointer-events: none;
  z-index: 1;
  background-image: linear-gradient(#12101000 50%, #00000040 50%), linear-gradient(90deg, #ff00000f, #00ff0005, #0000ff0f);
  background-size: 100% 1px, 1px 100%;
  width: 100%;
  height: 100%;
  display: block;
  position: fixed;
  inset: 0;
}

#base {
  box-sizing: border-box;
  background-color: #000;
  background-image: url("pfp.jpg");
  background-size: cover;
  justify-content: center;
  align-items: center;
  width: 250px;
  height: 250px;
  display: flex;
}

img {
  filter: drop-shadow(0 0 1rem #f0f);
  transition: transform .3s;
  transform: skew(-15deg);
}

img:hover {
  transform: scale(1.15)skew(-15deg);
}
</style>
</head>
<body>
    <div class="overlay"></div>
    <div id="base">
        <a href="https://violet-99.neocities.org" target="_blank"><img src="title.png" width="200"></a>
    </div>
    <script type="text/tilescript">// Only executes while your tile is active
// Only ES5 is supported, limited subset of APIs - DOM, localStorage, XMLHttpRequest, Canvas.
console.log("Hello world!");</script>
</body>
    <script type="text/tilescript"></script>
</html>
