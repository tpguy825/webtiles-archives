<!DOCTYPE html>
<html lang="jp">
<head>
<style>.tile-body {
  color: #fff;
  text-align: center;
  background: #702b24 url("japanesegirlback.jpg") no-repeat;
  width: 250px;
  height: 250px;
  padding: 0 5px;
}

header, footer {
  width: 240px;
  position: absolute;
}

header {
  font-size: 15px;
  top: 5px;
}

footer {
  font-size: 8px;
  top: 220px;
}

a {
  color: #fff;
}

img {
  image-rendering: pixelated;
  transition: all .15s;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(1);
}

.active img {
  top: 10px;
  transform: scale(.65);
}
</style>
</head>
