<!DOCTYPE html>
<html lang="en">

<head>
    <style>.tile-body {
  color: #111;
  margin: unset;
  background: linear-gradient(90deg, #c5ccd4 0% 70%, #cbd2d8 70% 100%) 0 0 / 5px 100%;
  flex-direction: column;
  justify-content: space-between;
  font-family: Helvetica, sans-serif;
  font-weight: bold;
  display: flex;
}

.upperbar {
  box-sizing: border-box;
  background: linear-gradient(#f1f1f9, #bcc7cd);
  border-bottom: 1px solid #55636e;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  height: 20px;
  padding: 0 4px;
  font-size: 13px;
  line-height: 1;
  display: flex;
}

.upperbar > * {
  filter: drop-shadow(0 1px #ffffff80);
}

.wifi, .battery {
  color: #4d5152;
  height: 10px;
  font-size: 12px;
  translate: 0 -1px;
}

.header {
  color: #fff;
  text-shadow: 0 -1px #66180d;
  background: linear-gradient(#ff8a5b, #ff5f1e 50%, #f84700 50%, #c22310);
  border-bottom: 1px solid #66180d;
  justify-content: space-evenly;
  align-items: center;
  width: 100%;
  height: 35px;
  font-size: 16px;
  display: flex;
}

.content {
  text-shadow: 0 1px #f6f7f8;
  color: #4c566c;
  padding: 20px 8px;
  font-size: 15px;
  line-height: 1;
}

.where {
  border: 1px solid #ababab;
  border-radius: 9px;
  grid-template-rows: repeat(2, 1fr);
  height: 70px;
  margin-top: 5px;
  display: grid;
  overflow: hidden;
  box-shadow: inset 0 1px 1px #0000001a, 0 1px #f6f7f8;
}

.where a div {
  box-sizing: border-box;
  color: #000;
  background: #f7f7f7;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  height: 100%;
  padding: 0 9px;
  line-height: 1;
  transition: filter 70ms ease-in-out;
  display: flex;
}

.where a div:active {
  filter: brightness(.9);
}

.where a:first-child div {
  border-bottom: 1px solid #ababab;
}

.nav {
  background: linear-gradient(#2f2f2f, #151515 50%, #000 50% 100%);
  border-top: 1px solid #0f0f0f;
  grid-template-columns: repeat(4, 1fr);
  width: 100%;
  height: 36px;
  display: grid;
  box-shadow: inset 0 1px #575757;
}

a {
  color: #fff;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  text-decoration: none;
  display: flex;
}

.icon {
  color: #fff;
  opacity: .65;
  user-select: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 8px;
  display: flex;
  position: relative;
}

.icon img {
  opacity: .7;
  filter: drop-shadow(0 -1px #000);
}

.icon span {
  margin-top: 2px;
}

.icon.active {
  opacity: 1;
  z-index: 1;
}

.icon.active img {
  opacity: 1;
  filter: drop-shadow(0 1px 1px #000000b3);
}

.icon.active:after, .icon:after {
  content: "";
  z-index: -1;
  opacity: .2;
  background: #fff;
  border-radius: 2px;
  width: calc(100% - 4px);
  height: calc(100% - 4px);
  position: absolute;
  top: 2px;
  left: 2px;
}

.icon:after {
  opacity: 0;
}

.icon:not(.icon.active):hover:after {
  opacity: .1;
}
</style>
</head>

<body>
    <div>
        <div class="upperbar">
            <div class="wifi">
                <img src="images/wifi.png">
                WBTL
                <img src="images/signal.png" style="margin-left: 2px;">
            </div>
            <span id="time"></span>
            <div class="battery">
                100%
                <img src="images/battery.png">
            </div>
        </div>
        <div class="header">
            block_618's WebTile
        </div>
    </div>
    <div class="content">
        <span style="margin-left: 9px;">where to?</span>
        <div class="where">
            <a href="https://block-618.com/" target="_blank">
                <div>
                    neocities
                    <img src="images/arrow.png">
                </div>
            </a>
            <a href="https://block-618.nekoweb.org/" target="_blank">
                <div>
                    nekoweb
                    <img src="images/arrow.png">
                </div>
            </a>
        </div>
    </div>
    <div class="nav">
        <div class="icon active">
            <img src="images/home.png">
            <span>Home</span>
        </div>
        <div class="icon">
            <a href="https://block-618.com/portfolio" target="_blank">
                <img src="images/portfolio.png">
                <span>Portfolio</span>
            </a>
        </div>
        <div class="icon">
            <a href="https://yellowtealpurple.net/forums/blogs/blog/618.18/" target="_blank">
                <img src="images/blog.png">
                <span>Blog</span>
            </a>
        </div>
        <div class="icon">
            <a href="https://block-618.atabook.org/" target="_blank">
                <img src="images/guestbook.png">
                <span>Guestbook</span>
            </a>
        </div>
    </div>
    <script type="text/tilescript">// Only executes while your tile is active
// Only ES5 is supported, limited subset of APIs - DOM, localStorage, XMLHttpRequest, Canvas.
var time = document.getElementById('time');

function updateClock() {
    var date = new Date();
    var hours = date.getHours();
    var minutes = date.getMinutes();
    var ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    minutes = minutes < 10 ? '0' + minutes : minutes;
    time.textContent = hours + ':' + minutes + ' ' + ampm;
}

updateClock();
setInterval(updateClock, 1000);</script>
</body>

</html>
