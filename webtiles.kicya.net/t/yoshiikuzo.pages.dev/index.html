<!DOCTYPE html>

<head>
<style>.tile-body {
  color: #fff;
  background: #fc8d45 url("oratokyosaikudaback.jpg") no-repeat;
  font-size: 11px;
}

header, footer {
  width: 230px;
}

header {
  position: absolute;
  top: 5px;
  left: 10px;
}

footer {
  position: absolute;
  top: 195px;
  left: 10px;
}

a {
  color: #000;
}

img {
  image-rendering: pixelated;
  transition: all .15s;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(1);
}

.active img {
  top: -10px;
  left: -40px;
  transform: scale(.6);
}
</style>
