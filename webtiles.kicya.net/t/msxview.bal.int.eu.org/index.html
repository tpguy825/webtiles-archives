<!DOCTYPE html>
<html lang="en">
<head>
<style>.tile-body {
  background: #000;
}

#⌨ {
  white-space: nowrap;
  font-size: 15px;
  display: flex;
}

a {
  color: #000;
  padding: 250px;
}

a:before {
  content: url("msxview-about.jpg");
  opacity: 0;
  position: absolute;
  top: -256rem;
  left: -256rem;
}

a:after {
  content: url("msxview.jpg");
  image-rendering: pixelated;
  position: fixed;
  top: 0;
  left: 0;
}

.active a:after {
  content: url("msxview-about.jpg");
}
</style>
</head>
<body>
<div id="⌨"><a href="https://www.youtube.com/watch?v=sb8n58LoUuA" target="_blank">MSXView</a></div>
</body>
</html>
