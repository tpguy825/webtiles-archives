<!DOCTYPE html>
<html lang="en">
<head>
    <style>.tile-body {
  image-rendering: pixelated;
  background-color: #000;
}

main {
  mask-image: linear-gradient(0deg, #aaaa 50%, #fff 50%), linear-gradient(90deg, #eeee 50%, #fff 50%);
  mask-position: 0 0, 0 0;
  mask-size: 256px 2px, 3px 256px;
  mask-repeat: repeat, repeat;
  mask-clip: border-box, border-box;
  mask-origin: border-box, border-box;
  mask-composite: intersect;
  mask-mode: match-source, match-source;
}

img {
  display: block;
}

a {
  box-shadow: 0 0 16px #000;
}

a:hover {
  transform-origin: 0 100%;
  transform: scale(1.5);
}
</style>
</head>
<body>
    <main>
        <img src="aivibanner2026.jpg" style="position: relative; height: 242px; margin-left: -135px;">
    </main>
	<a href="https://aivi.party/" target="_blank" style="position: absolute; bottom: 14px; left: 6px;"><img src="aivi-party-88x31.gif" width="70"></a>
    <div style="position: absolute; bottom: 0; height: 8px; width: 100%; background-image: linear-gradient(90deg, #b69aea, #bb0de4, #a777d6);"></div>
</body>
</html>
