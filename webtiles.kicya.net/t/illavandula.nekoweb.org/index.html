<!DOCTYPE html>
<html lang="en">
<head>
    <style>.tile-body {
  background: linear-gradient(maroon, #f08080 180px, #ffb6c1 180px, #f08080);
  width: 250px;
  height: 250px;
  margin: 0;
  overflow: hidden;
}

hr {
  background: maroon;
  border: none;
  height: 5px;
}

#card {
  background: url("panel.png") 0 0 / cover;
  width: 225px;
  height: 155px;
  margin: 10px auto;
}

#card:hover {
  background: url("card.png") 0 0 / cover;
}

#navi {
  background: linear-gradient(maroon, #f08080);
  border-radius: 5px;
  width: 200px;
  height: 30px;
  margin: auto;
}

#navi a {
  color: ivory;
  text-shadow: 0 0 2px;
  height: 100%;
  text-decoration: none;
}

#navi a:hover {
  color: #fffacd;
  text-shadow: 0 0 5px;
  text-decoration: none;
}

#navi p {
  text-align: center;
  height: 100%;
}

</head>

    <div id="card"></div>

    <hr>

    <div id="navi">
