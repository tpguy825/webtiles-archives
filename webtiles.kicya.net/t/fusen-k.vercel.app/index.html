<!DOCTYPE html>
<html lang="jp">
<head>
<style>.tile-body {
  white-space: nowrap;
  background: #fff url("250x250.webp") no-repeat;
  font-size: 15px;
  display: flex;
}

#■ {
  width: 250px;
  height: 250px;
  position: absolute;
  top: 0;
  left: 0;
}

#■ a {
  padding: 250px;
}

#🎈 {
  opacity: 0;
  background: #fffc;
  border-radius: 31px;
  transition: all 1s;
  position: absolute;
  top: 190px;
  left: 80px;
}

#🎈 a {
  color: #111;
  padding: 11px 13px 13px;
  line-height: 33px;
  text-decoration: none;
}

.active #🎈 {
  opacity: 1;
}
</style>
</head>
<body>
<div id="■"><a href="https://fusen-k.vercel.app/" target="_blank"></a></div>
<div id="🎈"><a href="https://fusen-k.vercel.app/" target="_blank">ふうせん・Ｋ🎈🎤</a></div>
</body>
</html>
