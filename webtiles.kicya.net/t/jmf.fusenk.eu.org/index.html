<!DOCTYPE html>
<html lang="en">
<head>
<style>.tile-body {
  color: #000;
  text-align: center;
  background: #fff;
  border: 0;
  margin: 0;
  padding: 150px 10px;
  font-size: 13px;
}

header, footer {
  width: 230px;
}

header {
  position: absolute;
  top: 5px;
}

footer {
  position: absolute;
  top: 225px;
}

a {
  color: #000;
}

img {
  image-rendering: pixelated;
  transition: all .3s;
  position: absolute;
  top: 0;
  left: 0;
  transform: scale(1);
}

.active img {
  transform: scale(.8);
}
</style>
</head>
<body>
<header>
Dixie Flatline<br>
</header>
<footer>
<a href="https://www.youtube.com/watch?v=rR_ZDyhi7Eg" target="_blank">
Just Be Friends</a><br>
</footer>
<a href="https://www.youtube.com/watch?v=rR_ZDyhi7Eg" target="_blank">
<img src="jmf.jpg"></a>
</body>
</html>
