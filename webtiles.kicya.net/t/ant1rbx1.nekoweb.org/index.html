       <script type="text/tilescript">const elementos = document.querySelectorAll(".type");

elementos.forEach((el, index) => {
  const texto = el.innerText;
  el.innerText = "";

  let i = 0;

  function digitar() {
    if (i < texto.length) {
      el.innerText += texto.charAt(i);
      i++;
      setTimeout(digitar, 40);
    }
  }

  // delay entre cada linha (efeito terminal)
  setTimeout(digitar, index * 1000);
});</script>
