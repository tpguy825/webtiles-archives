<!DOCTYPE html>
<html lang="en">
<head>
    <style>@font-face {
  src: url("Nintendo-DS-BIOS.ttf");
  font-family: DSBios;
  font-weight: normal;
  font-style: normal;
}

.tile-body {
  text-align: center;
  color: #fff;
  image-rendering: pixelated;
  background-color: #0000;
  background-image: url("ysoc.png");
  background-position: center;
  background-repeat: no-repeat;
  background-size: 83%;
  background-attachment: scroll, scroll, fixed;
  background-origin: padding-box, padding-box, padding-box;
  background-clip: border-box, border-box, border-box;
  border: 1px solid #000000b3;
  font-size: 12px;
  transition: all .3s;
  box-shadow: 2px 2px 10px 1px #00000042, inset 0 0 0 1px #fffa;
}

.tile-body:before {
  content: "";
  opacity: 1;
  z-index: -1;
  pointer-events: none;
  background: url("dotbg.gif"), #fff linear-gradient(#fff 0, #5e8cfc4d 3%, #2e59ae61 50%, #053a9d66 50%, #053dc62b 100%);
  border-image: url("border.gif") 20 / 30px round;
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  box-shadow: inset 0 0 0 1px #fffd;
}

.tile-body:after {
  content: "";
  opacity: .2;
  pointer-events: none;
  background-image: url("frame1.png");
  background-position: top;
  background-repeat: no-repeat;
  background-size: 100%;
  width: 100%;
  height: 100%;
  display: inline-block;
  position: absolute;
  top: 0;
  left: 0;
}

.tile-body:hover {
  cursor: url("index.html");
  background-size: 90%;
}

#enter {
  color: #fff;
  font-family: DSBios;
  font-size: 30px;
  text-decoration: none;
  position: relative;
  top: 160px;
}

#enter:hover {
  font-size: 35px;
  transition: all .3s;
}
</style>
</head>
<body>
    <script type="text/tilescript">// Only executes while your tile is active
// Only ES5 is supported, limited subset of APIs - DOM, localStorage, XMLHttpRequest, Canvas.
console.log("Hello world!");</script>
    <a id="enter" href="https://yuentp.nekoweb.org/" target="_blank">Enter!</a>
</body>
</html>
