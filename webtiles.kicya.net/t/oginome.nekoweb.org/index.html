<!DOCTYPE html>
<html lang="en">
<head>
    <style>.tile-body {
  -webkit-box-sizing: border-box;
  -moz-box-sizing: border-box;
  box-sizing: border-box;
  color: brown;
  text-align: center;
  scrollbar-color: brown transparent;
  scrollbar-width: thin;
  background-image: url("webtile%20bg.png");
  background-size: cover;
  background-clip: padding-box;
  border: 10px solid #0000;
  border-image: url("lightgreylace2.png") 17 round;
  width: 250px;
  height: 250px;
  font-family: MS gothic, monospace;
  font-size: 20px;
  overflow: hidden auto;
}

a:link, a:visited {
  color: brown;
  background-color: #0000;
  text-decoration: none;
}

a:hover {
  color: orange;
  background-color: #0000;
  text-decoration: underline;
}

a:active {
  color: #fff;
  background-color: #0000;
  text-decoration: underline;
}

.header {
  background-image: url("header%20bg.jpg");
  background-size: 90%;
  background-clip: padding-box;
  border-top: 10px solid #0000;
  border-bottom: 10px solid #0000;
  border-image: url("header%20border.gif") 20 round;
}

.inner {
  -webkit-box-sizing: border-box;
  -moz-box-sizing: border-box;
  box-sizing: border-box;
  text-align: left;
  float: left;
  border: 8px solid;
  background-color: #fff7e3;
  background-size: cover;
  border-image-source: url("frameborder.png");
  border-image-slice: 130 125 125 130;
  border-image-outset: 0;
  border-image-repeat: stretch;
  width: 120px;
  height: 99px;
  margin-left: 7px;
  padding: 4px;
  font-size: 12.49px;
  overflow: hidden auto;
}

.pic {
  float: left;
  z-index: 999;
  cursor: pointer;
  width: 87px;
  height: 99px;
  margin-left: 7px;
  -webkit-transition-property: all;
  -webkit-transition-duration: .3s;
  -webkit-transition-timing-function: ease;
  display: block;
}

.pic:hover {
  -webkit-filter: brightness(107%);
  transform: scale(1.1);
}
</style>
</head>
<body>
  <div class="header">
    <img src="yellow14.gif">
      <a href="https://oginome.nekoweb.org/" style="text-decoration:none;" target="_blank"><b>Oginome's Room</b></a>
    <img src="yellow14.gif">
  </div>
  <div class="inner" style="scrollbar-color: brown transparent; scrollbar-width: thin;"> welcome to my little corner on the internet... click the header to enter </div>
  <div class="pic" style="scrollbar-color: brown transparent; scrollbar-width: thin;">
    <a href="https://www.youtube.com/watch?v=Ys6dC4CR3gc" target="_blank">
      <img src="miniframe.png" width="90">
    </a>
  </div>
  <img src="bottom1.gif" width="225">
  <img src="bottom2.gif" width="125" height="28">
    <script type="text/tilescript">// Only executes while your tile is active
// Only ES5 is supported, limited subset of APIs - DOM, localStorage, XMLHttpRequest, Canvas.
console.log("Hello world!");</script>
</body>
</html>
