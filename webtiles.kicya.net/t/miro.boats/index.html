<!DOCTYPE html>
<html>
    <head>
        <style>.tile-body {
  overflow: scroll;
}

#tiles {
  grid-template: repeat(30, 1fr) / repeat(30, 1fr);
  width: 4096px;
  height: 4096px;
  margin: 1em;
  display: grid;
}

.tile {
  border: 1px solid red;
  width: 100%;
  height: 100%;
  display: inline-block;
}

#toolbar {
  backdrop-filter: blur(4px);
  background-color: #fff8;
  width: 100%;
  margin: 0;
  padding: 4px;
  font-size: small;
  position: fixed;
  bottom: 0;
  left: 0;
}
</style>
    </head>
    <body>
        <div id='tiles'></div>
        <p id='toolbar'>MicroTiles - <a href="about.html">about</a></p>

        <script type="text/tilescript">
            var tiles = document.getElementById('tiles');

            for (var y = 1; y <= 30; y++) {
                for (var x = 1; x <= 30; x++) {
                    var tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.textContent = x + ',' + y;
                    tiles.appendChild(tile);
                }
            }
        </script>
    </body>
</html>
