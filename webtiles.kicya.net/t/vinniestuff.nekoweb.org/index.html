<!DOCTYPE html>
<html lang="en">
<head>
    <style>@keyframes slide {
  from {
    background-position: 0 0;
  }

  to {
    background-position: -50px 50px;
  }
}

@keyframes slidet {
  from {
    background-position: 0 0;
  }

  to {
    background-position: -100px 50px;
  }
}

.tile-body {
  image-rendering: pixelated;
  background-image: url("tilemillion.png");
  animation: 20s linear infinite slide;
}

img {
  z-index: 69420;
  position: fixed;
}

img#cm {
  transform: translate(25px, -175px);
}

div {
  background-image: url("tilebillion.png");
  background-repeat: repeat;
  width: 100%;
  height: 100%;
  animation: 20s linear infinite slidet;
}
</style>
</head>
<body>
    <img src="coner.png">
    <div>
    </div>
    <a href="https://vinniestuff.nekoweb.org" target="_blank"><img src="click%20me.png" id="cm"></a>
</body>
</html>
