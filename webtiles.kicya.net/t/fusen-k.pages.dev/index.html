<!DOCTYPE html>
<html lang="jp">
<head>
<style>@keyframes floating-y {
  0% {
    transform: translateY(-5%);
  }

  100% {
    transform: translateY(5%);
  }
}

.tile-body {
  background: #b8dcf4 url("250x250.jpg") no-repeat;
}

#🟦 {
  white-space: nowrap;
  display: flex;
}

#🎈 {
  background: url("fu-sen.webp") no-repeat;
  width: 225px;
  height: 225px;
  animation: 2.5s ease-in-out infinite alternate-reverse floating-y;
  position: fixed;
  top: 5px;
  left: 18px;
}

#🔗 {
  font-size: 15px;
}

a {
  opacity: 0;
  padding: 15px 250px 250px 15px;
  transition: all 1s;
  position: absolute;
}

.active a {
  opacity: 1;
}
</style>
</head>
<body>
<div id="🟦">
<div id="🎈"></div>
<div id="🔗"><a href="https://fusen-k.pages.dev/" target="_blank">ふう🎀 せん🐰</a></div>
</div>
</body>
</html>
