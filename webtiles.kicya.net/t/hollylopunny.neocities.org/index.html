<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>.tile-body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

.bun {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 2;
  background-image: url("assets/bun.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 30px;
  left: 40px;
  transform: scale(-1, 1);
}

.bun-shadow {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  background-image: url("assets/bun-shadow.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 121px;
  left: 40px;
  transform: scale(-1, -.4);
}

.lop-shadow {
  width: 230px;
  height: 100%;
  image-rendering: crisp-edges;
  z-index: 1;
  background-image: url("assets/lop-shadow.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  bottom: 122px;
  left: 23px;
  transform: scale(1, -.4);
}

a {
  font-family: RSE;
  text-decoration: none;
}

.sparkle {
  opacity: 0;
  width: 200px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/gen3_sparkle.gif");
  background-size: cover;
  position: absolute;
  top: 40px;
  left: -20px;
}

.sparkle:hover {
  opacity: 1;
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.main-pixel-border {
  z-index: 2;
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 154px;
  height: 220px;
  position: absolute;
  bottom: 8px;
  left: 19px;
}

.wrapper {
  z-index: 1;
  background-color: pink;
  border-bottom-right-radius: 40px;
  border-bottom-left-radius: 40px;
  width: 90%;
  height: 100%;
  margin-left: 15px;
  bottom: 0;
}

.bottom-left {
  z-index: -1;
  background: linear-gradient(315deg, #06237c 0%, #041b72 48%, #0000 52%);
  width: 40px;
  height: 40px;
  position: absolute;
}

.bottom-left-2 {
  z-index: -10;
  background: linear-gradient(#fcbf74 0%, #ffe4a8 100%);
  width: 40px;
  height: 100%;
  position: absolute;
}

.bottom-right {
  z-index: -1;
  background: linear-gradient(45deg, #0d3495 50%, #170b2300 50%);
  width: 40px;
  height: 40px;
  position: absolute;
}

.bottom-right-2 {
  z-index: -10;
  background: #261437 linear-gradient(#4b2270 0%, #261437 45%, #150a21 100%);
  width: 40px;
  height: 100%;
  position: absolute;
}

.bow {
  width: 41px;
  height: 37.5px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/bow_white_bkg.png");
  background-size: cover;
  position: absolute;
}
</style>
</head>
<body>
