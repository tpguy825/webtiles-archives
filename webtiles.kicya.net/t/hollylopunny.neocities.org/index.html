<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>.tile-body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

.bun {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 2;
  background-image: url("assets/bun.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 40px;
  left: 65px;
  transform: scale(1);
}

.bun-shadow {
  width: 100px;
  height: 120px;
  image-rendering: crisp-edges;
  background-image: url("assets/bun-shadow.gif");
  background-position: 0 -72px;
  background-repeat: no-repeat;
  background-size: cover;
  display: block;
  position: absolute;
  bottom: -29px;
  left: 65px;
  transform: scale(1, -.4);
}

.lop-shadow {
  width: 230px;
  height: 100%;
  image-rendering: crisp-edges;
  z-index: 1;
  background-image: url("assets/lop-shadow.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  bottom: 122px;
  left: 23px;
  transform: scale(1, -.4);
}

a {
  font-family: RSE;
  text-decoration: none;
}

.sparkle {
  opacity: 0;
  width: 200px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/gen3_sparkle.gif");
  background-size: cover;
  position: absolute;
  top: 40px;
  left: -20px;
}

.sparkle:hover {
  opacity: 1;
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.main-pixel-border {
  image-rendering: crisp-edges;
  z-index: 2;
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 220px;
  height: 154px;
  position: absolute;
  top: 19px;
  right: 19px;
}

.wrapper {
  image-rendering: crisp-edges;
  z-index: 1;
  background: pink url("assets/sparkle2.gif") 48px 0;
  border-top-right-radius: 40px;
  border-bottom-right-radius: 40px;
  width: 100%;
  height: 90%;
  margin-top: 15px;
  margin-left: -15px;
  bottom: 0;
  overflow: clip;
}

.bottom-left-2 {
  z-index: -2;
  background: linear-gradient(45deg, #ffe4a8 0% 86%, #0000 87%);
  width: 100%;
  height: 40px;
  position: absolute;
  top: 0;
  transform: scale(1, -1);
}

.bottom-right {
  z-index: -1;
  background: linear-gradient(45deg, #0d3495 50%, #170b2300 50%);
  width: 40px;
  height: 40px;
  position: absolute;
}

.bottom-right-2 {
  z-index: -10;
  background: #261437 linear-gradient(#4b2270 0%, #261437 45%, #150a21 100%);
  width: 40px;
  height: 100%;
  position: absolute;
}

.bottom-duck {
  z-index: -11;
  background: url("assets/bun_bottom_blu.png") 0% bottom / 250px 10px;
  width: 100%;
  height: 10px;
  position: absolute;
  bottom: 0;
}

.bow {
  width: 41px;
  height: 37.5px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/bow_white_bkg.png");
  background-size: cover;
  position: absolute;
}

.heart-spin {
  z-index: 100;
  background-image: url("assets/heartspin.gif");
  background-repeat: no-repeat;
  background-size: contain;
  width: 100px;
  height: 50px;
  position: absolute;
  top: 70px;
  left: 0;
}
</style>
