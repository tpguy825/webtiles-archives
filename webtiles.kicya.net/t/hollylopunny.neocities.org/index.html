<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>.tile-body {
  background-color: pink;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

.bun {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 2;
  background-image: url("assets/bun.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 30px;
  left: 40px;
  transform: scale(-1, 1);
}

.bun-shadow {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  filter: opacity(.5) contrast(0%) brightness(22.8%) sepia() hue-rotate(300deg);
  background-image: url("assets/bun.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 121px;
  left: 40px;
  transform: scale(-1, -.4);
}

.lop-shadow {
  width: 230px;
  height: 100%;
  image-rendering: crisp-edges;
  filter: opacity(.5) contrast(0%) brightness(22.8%) sepia() hue-rotate(300deg);
  z-index: 1;
  background-image: url("assets/lopsass.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  bottom: 122px;
  left: 23px;
  transform: scale(1, -.4);
}

a {
  font-family: RSE;
  text-decoration: none;
}

.sparkle {
  opacity: 0;
  width: 200px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/gen3_sparkle.gif");
  background-size: cover;
  position: absolute;
  top: 40px;
  left: -20px;
}

.sparkle:hover {
  opacity: 1;
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.main-pixel-border {
  z-index: 2;
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 174px;
  height: 220px;
  position: absolute;
  bottom: 8px;
  left: 8px;
}
</style>
</head>
<body>
    
    
	<div class="main-pixel-border"></div> 
    	
    	<a class href="http://lopunny.nekoweb.org/" target="_blank"> 
        	<div class="url" style="position: absolute; right: 30px; top: 55px; width: auto; rotate: 20deg; font-size: 35px; z-index: 5">
                # 427
            </div>
            
        	<div class="url" style="position: absolute; bottom: 8px;  width: 100%; bottom: 8px; z-index: 6">
            	lopunny.nekoweb.org
        	</div>
            <div class="sparkle">
                
            </div>
        	<div class="bun"></div>
            <div class="bun-shadow"></div>
            <div class="lop-shadow"></div>
                
            
            
        
    	</a>
    
    <script src type="text/tilescript"></script>
    
</body>
</html>
