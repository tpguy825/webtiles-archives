<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>.tile-body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

@font-face {
  font-family: DPP;
  src: url("assets/DPP.ttf");
}

.bun {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 2;
  background-image: url("assets/bun.gif");
  background-repeat: no-repeat;
  background-size: contain;
  animation: none;
  display: block;
  position: absolute;
  top: 40px;
  left: 65px;
}

.bun-shadow {
  width: 100px;
  height: 120px;
  image-rendering: crisp-edges;
  background-image: url("assets/bun-shadow.gif");
  background-position: 0 -72px;
  background-repeat: no-repeat;
  background-size: cover;
  display: block;
  position: absolute;
  bottom: -29px;
  left: 65px;
  transform: scale(1, -.4);
}

.lop-shadow {
  width: 230px;
  height: 100%;
  image-rendering: crisp-edges;
  z-index: 1;
  background-image: url("assets/lop-shadow.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  bottom: 122px;
  left: 23px;
  transform: scale(1, -.4);
}

div {
  font-family: RSE;
  text-decoration: none;
}

.sparkle {
  opacity: 0;
  width: 200px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/gen3_sparkle.gif");
  background-size: cover;
  position: absolute;
  top: 40px;
  left: -20px;
}

.sparkle:hover {
  animation: 1.24s linear forwards done;
}

@keyframes done {
  0% {
    opacity: 1;
  }

  99% {
    opacity: 1;
  }

  100% {
    opacity: 0;
  }
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.main-pixel-border {
  image-rendering: crisp-edges;
  z-index: 2;
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 220px;
  height: 154px;
  position: absolute;
  top: 19px;
  right: 19px;
}

.wrapper {
  image-rendering: crisp-edges;
  z-index: 1;
  background: pink url("assets/sparkle2.gif") 48px 0;
  border-top-right-radius: 40px;
  border-bottom-right-radius: 40px;
  width: 100%;
  height: 90%;
  margin-top: 15px;
  margin-left: -15px;
  bottom: 0;
  overflow: clip;
}

.bottom-left-2 {
  z-index: -2;
  background: linear-gradient(45deg, #ffe4a8 0% 86%, #0000 87%);
  width: 100%;
  height: 40px;
  position: absolute;
  top: 0;
  transform: scale(1, -1);
}

.bottom-right {
  z-index: -1;
  background: linear-gradient(45deg, #0d3495 50%, #170b2300 50%);
  width: 40px;
  height: 40px;
  position: absolute;
}

.bottom-right-2 {
  z-index: -10;
  background: #261437 linear-gradient(#4b2270 0%, #261437 45%, #150a21 100%);
  width: 40px;
  height: 100%;
  position: absolute;
}

.bottom-duck {
  z-index: -11;
  background: url("assets/bun_bottom_blu.png") 0% bottom / 250px 10px;
  width: 100%;
  height: 10px;
  position: absolute;
  bottom: 0;
}

.bow {
  width: 41px;
  height: 37.5px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/bow_white_bkg.png");
  background-size: cover;
  position: absolute;
}

.heart-spin {
  z-index: 100;
  background-image: url("assets/heartspin.gif");
  background-repeat: no-repeat;
  background-size: contain;
  width: 100px;
  height: 50px;
  position: absolute;
  top: 70px;
  left: 0;
}

.ball {
  visibility: hidden;
  offset-path: path("m0.18 120.82c35.5-20.09 64.72-30 88.62-29.82 30.31 0.23 39.77 23.11 39.77 23.11v71.68l0.43-59.7-0.43 59.7v-31.03l-0.87 31.24 1.3-15.19-0.43 14.76");
  offset-distance: 100.0%;
  width: 16px;
  height: 24px;
  image-rendering: crisp-edges;
  offset-anchor: center;
  offset-rotate: 0deg;
  z-index: 200;
  background-image: url("assets/new_ball1.png");
  background-size: 1392px 24px;
  animation-play-state: paused;
  -webkit-animation-fill-mode: forwards;
  -moz-animation-fill-mode: forwards;
  animation-fill-mode: forwards;
  position: absolute;
  left: -10px;
  transform: scale(2);
}

.ball-end {
  visibility: hidden;
  offset-path: path("m0.18 120.82c35.5-20.09 64.72-30 88.62-29.82 30.31 0.23 39.77 23.11 39.77 23.11v71.68l0.43-59.7-0.43 59.7v-31.03l-0.87 31.24 1.3-15.19-0.43 14.76");
  offset-distance: 100.0%;
  offset-anchor: center;
  offset-rotate: 0deg;
  z-index: 201;
  background-image: url("assets/new_ball1.png");
  background-position: 100%;
  background-size: 1392px 24px;
  width: 16px;
  height: 24px;
  animation-play-state: paused;
  position: absolute;
  left: -10px;
  transform: scale(2);
}

.ball-shadow {
  visibility: hidden;
  offset-path: path("m0.18 186c28.54 0 55.43 0 80.19 0 35.74 0 48.06 0 48.06 0h0.57-0.57-1.16 1.73-0.57");
  offset-distance: 100.0%;
  width: 16px;
  height: 24px;
  image-rendering: crisp-edges;
  offset-anchor: center;
  offset-rotate: 0deg;
  z-index: 0;
  background-image: url("assets/ball_shadow.png");
  background-size: contain;
  position: absolute;
  top: 40px;
  left: -9px;
  transform: scale(2, -.8);
}

@keyframes bunscale {
  6% {
    filter: brightness();
    z-index: 2;
    margin-top: 0;
    margin-left: 0;
    transform: scale(1);
  }

  8% {
    z-index: 400;
  }

  9%, 100% {
    filter: brightness(10000%);
    margin-top: -30px;
    margin-left: -30px;
    transform: scale(0);
  }
}

@keyframes bunscaleshdw {
  6% {
    margin-left: 0;
    transform: scale(1, -.4);
  }

  9%, 100% {
    margin-left: -30px;
    transform: scale(0);
  }
}

@keyframes ballthrow {
  0% {
    offset-distance: 0%;
  }

  .2% {
    offset-distance: 0%;
  }

  1.5% {
    offset-distance: 28%;
  }

  19% {
    offset-distance: 28%;
  }

  28% {
    offset-distance: 100%;
  }

  100% {
    offset-distance: 100%;
  }
}

@keyframes ballthrows {
  0% {
    offset-distance: 0%;
  }

  .2% {
    offset-distance: 0%;
  }

  1.5% {
    offset-distance: 85%;
  }

  19% {
    offset-distance: 85%;
  }

  21% {
    offset-distance: 100%;
  }

  100% {
    offset-distance: 100%;
  }
}

.ah {
  pointer-events: all !important;
  cursor: pointer !important;
}

.hidden, .hidden2 {
  visibility: hidden;
}

.pink-diag {
  image-rendering: crisp-edges;
  z-index: 3000;
  border: 32px solid #0000;
  border-image: url("assets/pink_diag.png") 16 repeat;
  border-radius: 20px;
  width: 180px;
  height: 40px;
  position: absolute;
  left: 0;
}

.diag-wrapper {
  filter: drop-shadow(2px 2px #708090) drop-shadow(-2px -2px #708090);
  z-index: 2000;
  width: 230px;
  height: 40px;
  display: block;
  position: absolute;
  top: 8px;
  left: 0;
}

.diag-wrapper:before, .diag-wrapper:after {
  filter: none;
}

.diag-inner {
  box-sizing: border-box;
  z-index: 1000;
  background-color: #fff;
  border-radius: 10px;
  width: 100%;
  height: 100px;
  padding: 22px 10px 12px 12px;
  font-family: DPP;
  font-size: 13px;
  position: absolute;
  left: 2px;
}

.diag-continue {
  z-index: 3000;
  background-image: url("assets/diag_continue.gif");
  background-size: cover;
  width: 18px;
  height: 26px;
  position: absolute;
  bottom: -25px;
  right: -27px;
}

.site-link-cover {
  pointer-events: all;
  cursor: pointer;
  z-index: 10000;
  opacity: 0;
  width: 100%;
  height: 100%;
  position: absolute;
}

.site-link-cover:hover {
  opacity: 1;
  text-align: center;
  color: #d60051;
  padding-top: 130px;
  padding-right: 50px;
  font-size: 21px;
}
</style>
    
</head>
<body>

    <div class="wrapper">
    
	<div class="main-pixel-border"></div> 
    	
    	<div class="ah">
            
            
            <div class="ball-shadow"></div>
                
            
        	<div class="url" style="position: absolute; right: 30px; top: 55px; width: auto; rotate: 20deg; font-size: 35px; z-index: 5; font-weight: bold">
                # 427
            </div>
            
        	<div class="url" style="position: absolute; width: 100%; bottom: 10px; left: -124px; z-index: 6; font-weight: bold; font-size: 19px">

        	</div>
            
            
            <div class="url" style="position: absolute; width: 100%; bottom: 9px; left: -123px; z-index: 5; font-weight: bold; font-size: 19px; color: white;">
            	lopunny.nekoweb.org
        	</div>
            <div class="url" style="position: absolute; width: 100%; bottom: 9px; left: -125px; z-index: 5; font-weight: bold; font-size: 19px; color: white;">
            	lopunny.nekoweb.org
        	</div>
            <div class="url" style="position: absolute; width: 100%; bottom: 11px; left: -123px; z-index: 5; font-weight: bold; font-size: 19px; color: white;">

            <div class="url" style="position: absolute; width: 100%; bottom: 11px; left: -125px; z-index: 5; font-weight: bold; font-size: 19px; color: white;">

            <div class="hidden2 diag-wrapper" style="">

                    Gotcha! <br>
					Buneary was caught!

<script type="text/tilescript">
	var flag = false;

    var ball = document.querySelector('.ball');
    var balls = document.querySelector('.ball-shadow');
    var ballend = document.querySelector('.ball-end');
    var wrapper = document.querySelector('.ah');
    var bun = document.querySelector('.bun');
    var bunshadow = document.querySelector('.bun-shadow');
    var sparkle = document.querySelector('.sparkle');
    var hiddenbox = document.querySelector('.hidden');
    var hiddenbox2 = document.querySelector('.hidden2');
    

    var frameWidth =  16;
    var totalFrames = 87;
    var fps = 10;
    var currentFrame = 0;
    var timeoutId = null; 

    function stepFrame() {  
        ball.style.setProperty('background-position', -(currentFrame * frameWidth) + 'px 0px', 'important');
        currentFrame = (currentFrame + 1) % totalFrames;
        timeoutId = setTimeout(stepFrame, 1000 / fps);
    }
 
    wrapper.onclick = function() {
    	if(flag) {
        	
        	
        	return;
            
        }
        flag = true;
    
    	sparkle.style.visibility = 'hidden';
        ballend.style.visibility = 'hidden';
        balls.style.visibility = 'visible'; 
        ball.style.visibility = 'visible';
        ball.style.animation = 'none';
        ball.style.offsetDistance = '0%';
        ball.offsetHeight;

        currentFrame = 0;
        ball.style.setProperty('background-position', '0px 0px', 'important');
        ball.style.animation = '12s linear 1 ballthrow forwards';
        balls.style.animation = '12s linear 1 ballthrows forwards';
        
        bun.style.animation = '12s linear 1 bunscale ';
        bunshadow.style.animation = '12s linear 1 bunscaleshdw';

        if (timeoutId) clearTimeout(timeoutId);
        stepFrame();

        setTimeout(function() {
            clearTimeout(timeoutId);
            ball.style.visibility = 'hidden';
            ballend.style.visibility = 'visible';
            bun.style.visibility = 'hidden';
            bunshadow.style.visibility = 'hidden';
            
            setTimeout(function() {
            clearTimeout(timeoutId);
                hiddenbox.style.visibility = 'visible';
                hiddenbox2.style.visibility = 'visible';
            
            }, 1500);
            
        }, 8090);
        
        
        
        
    };
</script>
