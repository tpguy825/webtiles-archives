<!DOCTYPE html>
<html lang="en">
<head>
    <style>.tile-body {
  color: #111;
  background-color: #e42024;
  grid-template-areas: "anchor-left anchor-center anchor-right"
                       "feed-left feed-center feed-right";
  margin: 10px;
}

.container {
  background-color: #1e90ff;
  grid-template-columns: 200px 100px auto auto;
  padding: 10px;
  display: grid;
}

.grid-container {
  width: min (50px, 55px);
  background-color: green;
  grid-template-columns: .2fr .2fr .2fr;
  gap: 1em;
  margin: 10px auto;
  display: grid;
}

feed-left {
  background-color: gold;
  grid-area: feed-left;
}
</style>
</head>
<body>
    <p>You click the button go back:
    <a target="_blank" href="index.html">
        Click me!
    </a>
</p>
