<!DOCTYPE html>
<html lang="en">
<head>
  <style>*, :before, :after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, .tile-body {
  width: 100%;
  height: 100%;
  font-family: MS Sans Serif, Tahoma, Arial, sans-serif;
  font-size: 11px;
  overflow: hidden;
}

#desktop {
  background: teal repeating-linear-gradient(0deg, #0000000a 0 1px, #0000 1px 2px);
  position: absolute;
  inset: 0;
}

#reopen {
  cursor: pointer;
  user-select: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 68px;
  display: none;
  position: absolute;
  top: 10px;
  left: 10px;
}

#reopen img {
  object-fit: contain;
  width: 56px;
  height: 56px;
  image-rendering: pixelated;
}

#reopen span {
  color: #fff;
  text-shadow: 1px 1px #000;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
}

#reopen:hover span {
  background: navy;
  outline: 1px dotted #fff;
}

#webbtn-win {
  z-index: 1;
  border: 2px solid #000;
  border-color: #fff #000 #000 #fff;
  outline: 2px solid gray;
  position: absolute;
  bottom: 14px;
  right: 14px;
  box-shadow: 2px 2px #0006;
}

#webbtn-bar {
  color: #fff;
  cursor: move;
  user-select: none;
  background: linear-gradient(to right, navy, #1084d0);
  justify-content: space-between;
  align-items: center;
  gap: 4px;
  padding: 2px 4px;
  font-size: 10px;
  font-weight: bold;
  display: flex;
}

#webbtn-body {
  background: silver;
  padding: 4px;
}

#webbtn-body a {
  display: block;
}

#webbtn-body img {
  object-fit: contain;
  width: 88px;
  height: 31px;
  image-rendering: pixelated;
  border: 1px solid gray;
  display: block;
}

#win {
  z-index: 2;
  background: silver;
  border: 2px solid #000;
  border-color: #fff #000 #000 #fff;
  outline: 2px solid gray;
  flex-direction: column;
  display: flex;
  position: absolute;
  inset: 6px;
  box-shadow: 3px 3px #00000080;
}

#titlebar {
  user-select: none;
  background: linear-gradient(to right, navy, #1084d0);
  flex-shrink: 0;
  align-items: center;
  gap: 4px;
  padding: 2px 4px;
  display: flex;
}

#title-icon {
  object-fit: contain;
  width: 14px;
  height: 14px;
  image-rendering: pixelated;
  flex-shrink: 0;
}

#titlebar span {
  color: #fff;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex: 1;
  font-size: 11px;
  font-weight: bold;
  overflow: hidden;
}

#win-btns {
  flex-shrink: 0;
  gap: 2px;
  display: flex;
}

.wbtn {
  cursor: pointer;
  color: #000;
  background: silver;
  border: 1px solid #000;
  border-color: #fff #000 #000 #fff;
  justify-content: center;
  align-items: center;
  width: 16px;
  height: 14px;
  padding: 0;
  font-size: 9px;
  font-weight: bold;
  display: flex;
}

.wbtn:active {
  border: 1px solid #fff;
  border-color: #000 #fff #fff #000;
}

#menubar {
  background: silver;
  border-bottom: 1px solid gray;
  flex-shrink: 0;
  gap: 2px;
  padding: 1px 4px;
  display: flex;
}

.mitem {
  cursor: default;
  user-select: none;
  padding: 1px 6px;
}

.mitem:hover {
  color: #fff;
  background: navy;
}

#win-body {
  flex-direction: column;
  flex: auto;
  gap: 4px;
  min-height: 0;
  padding: 4px;
  display: flex;
  overflow: hidden;
}

#art-wrap {
  background: #000;
  border: 2px solid #fff;
  border-color: gray #fff #fff gray;
  flex: auto;
  min-height: 0;
  overflow: hidden;
}

#art {
  object-fit: cover;
  width: 100%;
  height: 100%;
  display: block;
}

#lcd {
  background: #000;
  border: 2px solid #dfdfdf;
  border-color: gray #dfdfdf #dfdfdf gray;
  flex-direction: column;
  flex-shrink: 0;
  gap: 3px;
  padding: 4px 6px;
  display: flex;
}

#lcd-top {
  justify-content: space-between;
  align-items: baseline;
  display: flex;
}

#track-name {
  color: #0f0;
  letter-spacing: .06em;
  white-space: nowrap;
  text-overflow: ellipsis;
  max-width: 72%;
  font-family: Courier New, monospace;
  font-size: 11px;
  font-weight: bold;
  overflow: hidden;
}

#track-num {
  color: #0c0;
  font-family: Courier New, monospace;
  font-size: 9px;
}

#prog-bg {
  cursor: pointer;
  background: #001a00;
  border: 1px solid #0a0;
  border-color: #040 #0a0 #0a0 #040;
  height: 8px;
  position: relative;
}

#prog-fill {
  pointer-events: none;
  background: #0f0;
  width: 0%;
  height: 100%;
}

#time-row {
  color: #0c0;
  justify-content: space-between;
  font-family: Courier New, monospace;
  font-size: 9px;
  display: flex;
}

#btn-row {
  flex-shrink: 0;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 2px 0;
  display: flex;
}

.cbtn {
  cursor: pointer;
  background: silver;
  border: 2px solid gray;
  border-color: #fff gray gray #fff;
  justify-content: center;
  align-items: center;
  padding: 4px 6px;
  display: flex;
}

.cbtn:active {
  border: 2px solid #fff;
  border-color: gray #fff #fff gray;
  padding: 5px 5px 3px 7px;
}

#btn-play {
  padding: 4px 8px;
}

#btn-play:active {
  padding: 5px 7px 3px 9px;
}
</style>
</head>
<body>

  <div id="desktop">
    <div id="webbtn-win">
      <div id="webbtn-bar">
        <span>redtail.works</span>
        <button id="webbtn-x" class="wbtn">&#10005;</button>
      </div>
      <div id="webbtn-body">
        <a href="https://redtail.works" target="_blank" rel="noopener">
          <img src="redtailglitter.gif" alt="redtail.works">
        </a>
      </div>
    </div>

    <div id="reopen">
      <img src="musicicon.webp" alt="Core Dump">
      <span>Core Dump</span>
    </div>
  </div>

  <div id="win">
    <div id="titlebar">
      <img id="title-icon" src="musicicon.webp" alt>
      <span>Core Dump - Media Player</span>
      <div id="win-btns">
        <button class="wbtn">_</button>
        <button class="wbtn">&#9633;</button>
        <button class="wbtn" id="btn-close">&#10005;</button>
      </div>
    </div>

    <div id="menubar">
      <span class="mitem">File</span>
      <span class="mitem">Play</span>
      <span class="mitem">Help</span>
    </div>

    <div id="win-body">
      <div id="art-wrap">
        <img id="art" src="AlbumCover1.webp" alt>
      </div>
      <div id="lcd">
        <div id="lcd-top">
          <span id="track-name">FRACTURE</span>
          <span id="track-num">01 / 08</span>
        </div>
        <div id="prog-bg">
          <div id="prog-fill"></div>
        </div>
        <div id="time-row">
          <span id="time-cur">0:00</span>
          <span id="time-dur">2:08</span>
        </div>
      </div>
      <div id="btn-row">
        <button class="cbtn" id="btn-prev"><canvas id="ic-prev" width="20" height="20"></canvas></button>
        <button class="cbtn" id="btn-play"><canvas id="ic-play" width="24" height="24"></canvas></button>
        <button class="cbtn" id="btn-next"><canvas id="ic-next" width="20" height="20"></canvas></button>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>
  <script type="text/tilescript">(function () {

  var COVERS = ['/AlbumCover1.webp', '/AlbumCover2.webp', '/AlbumCover3.jpg'];
  var TRACKS = [
    { file: '/Fracture.mp3',    name: 'Fracture',    dur: '2:08' },
    { file: '/Glass.mp3',       name: 'Glass',       dur: '2:23' },
    { file: '/God Machine.mp3', name: 'God Machine', dur: '1:44' },
    { file: '/Manhunt.mp3',     name: 'Manhunt',     dur: '1:41' },
    { file: '/Puddles.mp3',     name: 'Puddles',     dur: '2:13' },
    { file: '/Rot.mp3',         name: 'Rot',         dur: '1:38' },
    { file: '/Specter.mp3',     name: 'Specter',     dur: '2:41' },
    { file: '/japaneese.mp3',   name: '\u512a\u96c5\u306a\u7d42\u4e86', dur: '1:43' }
  ];

  // Random cover
  document.getElementById('art').src = COVERS[Math.floor(Math.random() * COVERS.length)];

  // DOM
  var audio      = document.getElementById('audio');
  var win        = document.getElementById('win');
  var reopen     = document.getElementById('reopen');
  var btnClose   = document.getElementById('btn-close');
  var btnPlay    = document.getElementById('btn-play');
  var btnPrev    = document.getElementById('btn-prev');
  var btnNext    = document.getElementById('btn-next');
  var progBg     = document.getElementById('prog-bg');
  var progFill   = document.getElementById('prog-fill');
  var timeCur    = document.getElementById('time-cur');
  var timeDur    = document.getElementById('time-dur');
  var trackName  = document.getElementById('track-name');
  var trackNum   = document.getElementById('track-num');

  // Canvas icons
  function drawPlay(id) {
    var c = document.getElementById(id); var cx = c.getContext('2d'); var s = c.width;
    cx.clearRect(0,0,s,s); cx.fillStyle = '#000'; cx.beginPath();
    cx.moveTo(s*.25,s*.15); cx.lineTo(s*.82,s*.5); cx.lineTo(s*.25,s*.85);
    cx.closePath(); cx.fill();
  }
  function drawPause(id) {
    var c = document.getElementById(id); var cx = c.getContext('2d'); var s = c.width;
    cx.clearRect(0,0,s,s); cx.fillStyle = '#000';
    cx.fillRect(s*.2,s*.15,s*.22,s*.7);
    cx.fillRect(s*.58,s*.15,s*.22,s*.7);
  }
  function drawPrev(id) {
    var c = document.getElementById(id); var cx = c.getContext('2d'); var s = c.width;
    cx.clearRect(0,0,s,s); cx.fillStyle = '#000';
    cx.fillRect(s*.12,s*.15,s*.14,s*.7);
    cx.beginPath();
    cx.moveTo(s*.85,s*.15); cx.lineTo(s*.30,s*.5); cx.lineTo(s*.85,s*.85);
    cx.closePath(); cx.fill();
  }
  function drawNext(id) {
    var c = document.getElementById(id); var cx = c.getContext('2d'); var s = c.width;
    cx.clearRect(0,0,s,s); cx.fillStyle = '#000';
    cx.fillRect(s*.74,s*.15,s*.14,s*.7);
    cx.beginPath();
    cx.moveTo(s*.15,s*.15); cx.lineTo(s*.70,s*.5); cx.lineTo(s*.15,s*.85);
    cx.closePath(); cx.fill();
  }
  drawPlay('ic-play');
  drawPrev('ic-prev');
  drawNext('ic-next');

  // Close / reopen
  btnClose.addEventListener('click', function () {
    win.style.display = 'none';
    reopen.style.display = 'flex';
  });
  reopen.addEventListener('click', function () {
    win.style.display = 'flex';
    reopen.style.display = 'none';
  });

  // Drag webbutton - use tile as move surface, not document
  var webbtnWin = document.getElementById('webbtn-win');
  var webbtnBar = document.getElementById('webbtn-bar');
  var tile      = document.getElementById('desktop');
  var dragging  = false;
  var ox = 0, oy = 0;

  webbtnBar.addEventListener('mousedown', function (e) {
    dragging = true;
    var r = webbtnWin.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    webbtnWin.style.right  = 'auto';
    webbtnWin.style.bottom = 'auto';
  });
  tile.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    webbtnWin.style.left = (e.clientX - ox) + 'px';
    webbtnWin.style.top  = (e.clientY - oy) + 'px';
  });
  tile.addEventListener('mouseup', function () { dragging = false; });
  tile.addEventListener('mouseleave', function () { dragging = false; });

  // Player state
  var idx     = 0;
  var playing = false;

  function loadTrack(i, autoplay) {
    idx = i;
    var t = TRACKS[i];
    audio.src = t.file;
    trackName.textContent = t.name.toUpperCase();
    timeDur.textContent   = t.dur;
    trackNum.textContent  = pad2(i + 1) + ' / ' + pad2(TRACKS.length);
    progFill.style.width  = '0%';
    timeCur.textContent   = '0:00';
    if (autoplay) { audio.play(); }
  }

  loadTrack(0, false);

  btnPlay.addEventListener('click', function () {
    if (playing) { audio.pause(); } else { audio.play(); }
  });
  btnPrev.addEventListener('click', function () {
    if (audio.currentTime > 3) { audio.currentTime = 0; }
    else { loadTrack((idx - 1 + TRACKS.length) % TRACKS.length, playing); }
  });
  btnNext.addEventListener('click', function () {
    loadTrack((idx + 1) % TRACKS.length, playing);
  });
  progBg.addEventListener('click', function (e) {
    if (!audio.duration) return;
    var r = progBg.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });

  audio.addEventListener('play',  function () { playing = true;  drawPause('ic-play'); });
  audio.addEventListener('pause', function () { playing = false; drawPlay('ic-play'); });
  audio.addEventListener('ended', function () { loadTrack((idx + 1) % TRACKS.length, true); });
  audio.addEventListener('timeupdate', function () {
    if (!audio.duration) return;
    progFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
    timeCur.textContent  = fmt(audio.currentTime);
  });

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function fmt(s) {
    if (!isFinite(s) || s < 0) return '0:00';
    var m = Math.floor(s / 60); var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

})();
</script>
</body>
</html>
