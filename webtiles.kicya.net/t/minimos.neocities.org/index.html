<!DOCTYPE html>                                                                                                                                                                        
<html lang="en">
<head>
    <style>.tile-body {
  color: #111;
  background: url("brand.png");
  animation: 60s infinite ScreenSaver;
}

@keyframes ScreenSaver {
  0% {
    background-image: url("brand.png");
  }

  5% {
    background-image: url("brand.png");
  }

  10% {
    background-image: url("Bad-Apple.png");
  }

  20% {
    background-image: url("Bad-Apple.png");
  }

  25% {
    background-image: url("Mossy_surfaces.png");
  }

  35% {
    background-image: url("Mossy_surfaces.png");
  }

  40% {
    background-image: url("Fountains.png");
  }

  50% {
    background-image: url("Fountains.png");
  }

  55% {
    background-image: url("bang.png");
  }

  80% {
    background-image: url("bang.png");
  }

  85% {
    background-image: url("brand.png");
  }

  100% {
    background-image: url("brand.png");
  }
}

.flash {
  color: red;
  text-shadow: 100px 3px red, 50px -2px red, 125px -15px red, -10px 8px red, 30px 12px red, 150px -20px red, 1px -1px red, 40px -15px red;
  animation: .2s steps(2, start) infinite blink-animation;
}

@keyframes blink-animation {
  to {
    visibility: hidden;
  }
}

#screensaver {
  backdrop-filter: blur(8px);
  opacity: 0;
  color: #fff;
  background: #000;
  width: 245px;
  max-width: 245px;
  height: 250px;
  max-height: 250px;
  padding: 2px 2px 2px 3px;
  transition: all 2s;
  position: absolute;
  top: 0;
  right: 0;
  overflow: hidden auto;
}

#screensaver:hover {
  opacity: 1;
  transition: all .2s;
}

#bang {
  z-index: 2;
  width: 100%;
  position: absolute;
  top: 1px;
  left: 0;
  box-shadow: 0 0 10px 2px #000 !important;
}

#screensaver:hover ~ #bang {
  display: none;
}

input {
  all: unset;
  width: 130px;
  margin-bottom: 4px;
}

#screen {
  display: block;
}
</style>
</head>
<body id="body">
    
    <script type="text/tilescript">// Only executes while your tile is active
// Only ES5 is supported, limited subset of APIs - DOM, localStorage, XMLHttpRequest, Canvas.
console.log("Hello world!");

function interpreter(input){
    	var screen = document.getElementById('screen');
    	var div = document.createElement('div');

        var left = document.createElement('span');
        left.style.color = 'lime';
        left.innerText = 'tile@-1,10.tiles';

        var colon = document.createElement('span');
        colon.innerText = ':';

        var tilde = document.createElement('span');
        tilde.style.color = 'blue';
        tilde.innerText = '~';

        var dollar = document.createElement('span');
        dollar.innerText = '$ ' + input; // input variable from your code

        div.appendChild(left);
    	div.appendChild(colon);
        div.appendChild(tilde);
        div.appendChild(dollar);
    	screen.appendChild(div);
    	
        var div = document.createElement("div");
		
    	var parts = (input || "").split(" ");
		var command = parts[0] || "";
		var args = parts.slice(1).join(" ");
    	if(command == "clear"){
            screen.innerText ="";
        }
        else if(command == "help"){
            div.innerText = "Avaible commands: cd, clear, print [word], whoami, sysinfo, hostname [arg], date, pwd, ls, help";
        }
    	else if(command == "screen"){
            div.innerText = "Resolution:	250x250";
        }
    	else if(command == "whoami"){
            div.innerText = "tile";
        }
    
    	else if(command == "pwd"){
            div.innerText = "/home/tile/";
        }
    	else if(command == "print" || command == "echo"){
            div.innerText = args;
        }
    	else if(command == "hostname"){
            if(args == ""){
                div.innerText = "-1,10.tiles";
            }
			else if(args === "-i"){
                div.innerText = "127.0.1.1";
            }
            else if(args === "-I"){
                div.innerText = "0.0.0.0";
            }
            else{
                div.innerText = "hostname: Invalid argument";
            }
            
        }
    	else if(command == "cd"){
            if(args == ""){
                div.innerText = "";
            }
			else if(args === "porn/" || args === "./porn" || args === "./porn/" || args === "porn"){
                div.innerText = "cd: Access denied, insufficient permissions";
            }
            else if(args === "~"){
            }
            else{
                div.innerText = "cd: No such file or directory";
            }
            
        }
    	else if(command == "sudo"){
            if(args === "ls porn/" || args === "ls ./porn" || args === "ls ./porn/" || args === "ls porn" || args === "cd porn/" || args === "cd ./porn" || args === "cd ./porn/" || args === "cd porn"){
                screen.innerText ="";
                while (true) {
            		div = document.createElement("div");
                   div.innerText = "cornhub.com";
                    div.style.color = 'red';
                    div.className = "flash";
                    screen.appendChild(div);
                }

            }
        }
    	else if(command == "sysinfo"){
            div.innerText = 'tile@-1,10.tiles';
            div.style.color = 'lime';
            screen.appendChild(div);
            div = document.createElement("div");
            div.innerText = "Resolution:	250x250";
            screen.appendChild(div);
            div = document.createElement("div");
            div.innerText = "Disk: 1.13 MB / 25 MB (4.52%)";
            screen.appendChild(div);
        }
    	else if(command == "date"){
            div.innerText = new Date().toDateString();
        }
    	else if(command == "ls"){
            if(args == "" || args === "~"){
                div.innerText = "app.js";
                screen.appendChild(div);
                div = document.createElement("div");
                div.innerText = "index.html";
                screen.appendChild(div);
                div = document.createElement("div");
                div.innerText = "main.css";
                screen.appendChild(div);
                div = document.createElement("div");
                div.innerText = 'porn/';
                div.style.color = 'blue';
                screen.appendChild(div);
                div = document.createElement("div");
            }
            else if(args === "porn/" || args === "./porn" || args === "./porn/" || args === "porn"){
                div.innerText = "ls: Access denied, insufficient permissions";
            }
            else{
                div.innerText = "cd: No such file or directory";
            }
        }
        else{
            div.innerText = "Try: help";
        }
    screen.appendChild(div);
    console.log("interpreted")
    var body = document.getElementById("screensaver");
    body.scrollTo(0, body.scrollHeight);
    sessionStorage.setItem("history", input);
}

var input = document.getElementById("commandline");
input.focus();
input.addEventListener('keyup', function(event) {
    console.log(event.key)
    if (event.key === 'Enter') {
        console.log('Return key was pressed!');
        interpreter(input.value)
		input.value = "";
    }
    if (event.key === 'ArrowUp') {
        console.log('ArrowUp key was pressed!');
        input.value = sessionStorage.getItem("history");
    }
});</script>
    <div id="bang">
    </div>
    <div id="screensaver">
            <output id="screen">
            </output>
        	<nobr><span style="color: lime;">tile@-1,10.tiles</span>:<span style="color: blue;">~</span>$ <input type="text" id="commandline" autocomplete="off"></nobr>
        <h6 style="position:absolute; bottom:-10px;">
            The neocity website is currently unsupported
        </h6>
    </div>
</body>
</html>
