<!DOCTYPE html>
<html lang="en">
<head>
    <script type="text/tilescript">
      function freezegifs() {
        var x = document.querySelectorAll('.sparkle img, img.sparkle'); 
        for(var i=0; i<x.length; i++) {
          x[i].src = x[i].src.slice(0, -3) + 'png' ;}}

      function resumegifs() {
        var x = document.querySelectorAll('.sparkle img, img.sparkle'); 
        for(var i=0; i<x.length; i++) {
          x[i].src = x[i].src.slice(0, -3) + 'gif' ;}}
    </script>
    
    <style>.tile-body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

* {
  font-family: RSE;
}

.lop {
  width: 100%;
  height: 220px;
  image-rendering: crisp-edges;
  z-index: 1;
  background-image: url("assets/lopsass.gif");
  display: block;
  position: absolute;
  top: 12px;
  left: 20px;
}

.lop-shadow {
  width: 90%;
  height: 220px;
  image-rendering: crisp-edges;
  background-image: url("assets/lop-shadow.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 138px;
  left: 23px;
  transform: scale(1, -.4);
}

.bun {
  width: 100px;
  height: 200px;
  image-rendering: crisp-edges;
  z-index: 2;
  opacity: 0;
  background-image: url("https://webtiles.kicya.net/t/lopunny.nekoweb.org/assets/bun.gif");
  background-repeat: no-repeat;
  background-size: contain;
  display: block;
  position: absolute;
  top: 30px;
  left: 40px;
  transform: scale(-1, 1);
}

a {
  font-family: RSE;
  text-decoration: none;
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.sparkle {
  opacity: 0;
  width: 220px;
  height: 220px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/gen3_sparkle.gif");
  background-size: cover;
  position: absolute;
  top: 30px;
  right: 20px;
}

.sparkle:hover {
  opacity: 1;
  border: 0;
}

.main-pixel-border {
  z-index: 2;
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 240px;
  height: 154px;
  position: absolute;
  top: 19px;
  left: 19px;
}

.wrapper {
  z-index: 1;
  background-color: pink;
  border-radius: 40px;
  width: 200%;
  height: 90%;
  margin-top: 15px;
  margin-left: 15px;
  overflow: clip;
}

.top-left {
  z-index: -1;
  background: #000;
  width: 100%;
  height: 40px;
  position: absolute;
}

.bottom {
  z-index: -1;
  background-color: #ffc2e0;
  width: 100%;
  height: 40px;
  position: absolute;
}

.bow {
  width: 41px;
  height: 37.5px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/bow_white_bkg.png");
  background-size: cover;
  position: absolute;
}
</style>
</head>
<body>
    <div class="bow" style="left: 0px;"></div>
    
    <div class="top-left" style="left: 0px; top: 0px"></div>

    <div class="bottom" style="bottom: 0px"></div>
    <div class="wrapper">
        
    
	<div class="main-pixel-border"></div>
    	
    	<a class href="http://lopunny.nekoweb.org/" target="_blank">
        	<div class="url" style="position: absolute; left: 24px; top: 34px; width: auto; rotate: -20deg; font-size: 35px">
                # 428
            </div>
            
        	<div class="url" style="position: absolute; bottom: 8px;  width: 100%; bottom: 0px; z-index:5">
            	
        	</div>
            
            <div class="sparkle" mouseover="resumegifs()"> </div>
            
               <div class="lop-shadow"></div> 
            
            
        	<div class="lop"></div>
            
            
            
        
    	</a>
    
    
    </div>
</body>
</html>
