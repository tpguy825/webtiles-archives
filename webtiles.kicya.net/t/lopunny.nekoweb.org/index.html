<!DOCTYPE html>
<html lang="en">

    <script type="text/tilescript">
      function freezegifs() {
        var x = document.querySelectorAll('.sparkle img, img.sparkle'); 
        for(var i=0; i<x.length; i++) {
          x[i].src = x[i].src.slice(0, -3) + 'png' ;}}

      function resumegifs() {
        var x = document.querySelectorAll('.sparkle img, img.sparkle'); 
        for(var i=0; i<x.length; i++) {
          x[i].src = x[i].src.slice(0, -3) + 'gif' ;}}
    </script>
    
    <style>.tile-body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

* {
  font-family: RSE;
}

.lop {
  width: 100%;
  height: 220px;
  image-rendering: crisp-edges;
  z-index: 1;
  background-image: url("assets/lopsass.gif");
  display: block;
  position: absolute;
  top: 8px;
  left: 18px;
  transform: scale(-1, 1);
}

.lop-shadow {
  width: 250px;
  height: 60px;
  image-rendering: crisp-edges;
  background-image: url("assets/lop-shadow.gif");
  background-position: 0 -160px;
  background-repeat: no-repeat;
  background-size: cover;
  display: block;
  position: absolute;
  bottom: -5px;
  left: 24px;
  transform: scale(-1, -.3);
}

a {
  font-family: RSE;
  text-decoration: none;
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.sparkle {
  opacity: 0;
  width: 220px;
  height: 220px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/gen3_sparkle.gif");
  background-size: cover;
  position: absolute;
  top: 30px;
  right: 20px;
}

.sparkle:hover {
  opacity: 1;
  border: 0;
}

.main-pixel-border {
  image-rendering: crisp-edges;
  z-index: 2;
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 240px;
  height: 154px;
  position: absolute;
  top: 19px;
  left: 19px;
}

.wrapper {
  image-rendering: crisp-edges;
  z-index: 1;
  background: pink url("assets/sparkle2.gif") 2px 0;
  border-radius: 40px;
  width: 200%;
  height: 90%;
  margin-top: 15px;
  margin-left: 15px;
  overflow: clip;
}

.top-left {
  z-index: -1;
  background: linear-gradient(45deg, #0000 0% 49%, #000 51%);
  width: 40px;
  height: 40px;
  position: absolute;
}

.top {
  z-index: -4;
  background: #000;
  width: 100%;
  height: 40px;
  position: absolute;
}

.left {
  z-index: -2;
  background-image: url("assets/wip_1.gif");
  background-position: 40px 0;
  background-size: cover;
  width: 40px;
  height: 100%;
  position: absolute;
  transform: scale(-1, 1);
}

.bottom-left {
  z-index: -1;
  background: linear-gradient(315deg, #0000 0%, #ffc2e0 19% 49%, #0000 51%);
  width: 40px;
  height: 40px;
  position: absolute;
  bottom: 0;
}

.bottom {
  z-index: -2;
  background-color: #ffc2e0;
  background-image: url("assets/bottom-g.png");
  background-position: -19px 2px;
  background-size: 253px 18px;
  width: 90%;
  height: 20px;
  position: absolute;
  right: 0;
}

.bow {
  width: 41px;
  height: 37.5px;
  image-rendering: crisp-edges;
  z-index: 10;
  background-image: url("assets/bow_white_bkg.png");
  background-size: cover;
  position: absolute;
}
</style>
