<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>.tile-body {
  background-color: pink;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: RSE;
  src: url("assets/RSE_HandwritingPixel.ttf");
}

* {
  font-family: RSE;
}

.lop {
  background-image: url("assets/lopsass.gif");
  height: 100%;
  display: block;
  position: relative;
  top: 12px;
  left: 20px;
}

a {
  font-family: RSE;
  text-decoration: none;
}

.url {
  color: #d60051;
  text-align: center;
  font-size: 23px;
  text-decoration: none;
}

.main-pixel-border {
  border: 30px solid #0000;
  border-image: url("assets/pixelbt.png") 30 /  / 10px repeat;
  border-radius: 40px;
  width: 174px;
  height: 174px;
  position: absolute;
  top: 8px;
  left: 8px;
}
</style>
</head>
<body>
    
    
	<div class="main-pixel-border"></div>
    	
    	<a class href="http://lopunny.nekoweb.org/" target="_blank">
        	<div class="url" style="position: absolute; left: 20px; top: 20px; width: auto; rotate: -20deg; font-size: 35px">
                # 428
            </div>
            
        	<div class="url" style="position: absolute; bottom: 8px;  width: 100%;">
            	lopunny.nekoweb.org
        	</div>
            
        	<div class="lop"></div>
        
    	</a>
    
    <script src type="text/tilescript"></script>
    
</body>
</html>
