<!DOCTYPE html>
<html lang="en">
<head>
<style>.tile-body {
  background: #2424ff;
}

#⌨ {
  white-space: nowrap;
  font-size: 15px;
  display: flex;
}

a {
  color: #000;
  padding: 250px;
}

a:before {
  content: url("msxyjk-program.jpg");
  opacity: 0;
  position: absolute;
  top: -256rem;
  left: -256rem;
}

a:after {
  content: url("msxyjk.jpg");
  image-rendering: pixelated;
  position: fixed;
  top: 0;
  left: 0;
}

.active a:after {
  content: url("msxyjk-program.jpg");
}
</style>
</head>
<body>
<div id="⌨"><a href="https://www.youtube.com/watch?v=ilN4r9Va1GY" target="_blank">MSX-BASIC - MSX2+ YJK Color drawing in 5 seconds</a></div>
</body>
</html>
